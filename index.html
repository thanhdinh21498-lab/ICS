function rAccounting(el){
  const canEdit=canEditAccounting();

  // ── Invoice rows ─────────────────────────────────────────────────
  const bm={paid:'bok',pending:'bwarn',overdue:'bbad',cancelled:'brose'};
  const invRows=STATE.invoices.map(inv=>{
    const bkd=inv.breakdown||{};
    const bkdStr=bkd.rent?'rent $'+Math.round(bkd.rent/1000)+'K'
      +(bkd.svc?' · svc $'+Math.round(bkd.svc/1000)+'K':'')
      +(bkd.elec?' · elec $'+Math.round(bkd.elec/1000)+'K':'')
      +(bkd.water?' · water $'+bkd.water:'')
      +(bkd.parking?' · park $'+bkd.parking:''):'—';
    return `<tr>
      <td class="tdm">${inv.id}</td>
      <td style="max-width:140px"><div style="font-size:12px">${inv.tenant.split(' ').slice(0,2).join(' ')}</div>
        <div style="font-size:9px;color:var(--txt3)">${bkdStr}</div></td>
      <td style="font-weight:500">$${inv.amount.toLocaleString()}</td>
      <td style="font-size:11px">${inv.issued}</td>
      <td style="font-size:11px">${inv.due}</td>
      <td><span class="badge ${bm[inv.status]||'bblue'}">${inv.status}</span></td>
      ${canEdit?`<td>
        <select class="finp" style="padding:3px 6px;font-size:10px;width:100px" onchange="updateInvoiceStatus('${inv.id}',this.value)">
          <option value="pending" ${inv.status==='pending'?'selected':''}>Pending</option>
          <option value="paid" ${inv.status==='paid'?'selected':''}>Paid</option>
          <option value="overdue" ${inv.status==='overdue'?'selected':''}>Overdue</option>
          <option value="cancelled" ${inv.status==='cancelled'?'selected':''}>Cancelled</option>
        </select>
      </td>`:'<td></td>'}
    </tr>`;
  }).join('');

  // ── Collections summary ───────────────────────────────────────────
  const totalInv=STATE.invoices.reduce((s,i)=>s+i.amount,0);
  const totalPaid=STATE.invoices.filter(i=>i.status==='paid').reduce((s,i)=>s+i.amount,0);
  const totalPend=STATE.invoices.filter(i=>i.status==='pending').reduce((s,i)=>s+i.amount,0);
  const totalOver=STATE.invoices.filter(i=>i.status==='overdue').reduce((s,i)=>s+i.amount,0);
  const collRate=totalInv>0?Math.round(totalPaid/totalInv*100):0;

  // ── Service charge analysis ───────────────────────────────────────
  const activeT=STATE.tenants.filter(t=>t.status!=='terminated'&&t.industry!=='Vacant');
  const totalSvcBilled=STATE.tenantRevenue.reduce((s,r)=>s+(r.svc_charge||0),0);
  const totalNLA=Object.values(BUILDING_CONFIG.floor_areas).reduce((s,v)=>s+v,0);
  const totalOccM2=activeT.reduce((s,t)=>s+t.m2,0);
  const stdSvcTarget=Math.round(BUILDING_CONFIG.std_svc_fee*totalOccM2);
  const svcEff=stdSvcTarget>0?Math.round(totalSvcBilled/stdSvcTarget*100):0;

  // ── Revenue breakdown by category ────────────────────────────────
  const totRent=STATE.tenantRevenue.reduce((s,r)=>s+(r.rent||0),0);
  const totElec=STATE.tenantRevenue.reduce((s,r)=>s+(r.elec||0),0);
  const totWater=STATE.tenantRevenue.reduce((s,r)=>s+(r.water||0),0);
  const totParking=STATE.tenantRevenue.reduce((s,r)=>s+(r.parking_car||0)+(r.parking_bike||0),0);
  const totAdmin=STATE.tenantRevenue.reduce((s,r)=>s+(r.admin_fee||0),0);
  const totOther=STATE.tenantRevenue.reduce((s,r)=>s+(r.other||0),0);
  const totRevenue=totRent+totalSvcBilled+totElec+totWater+totParking+totAdmin+totOther;

  // ── Per-tenant svc charge table ───────────────────────────────────
  const svcRows=activeT.map(t=>{
    const tr=STATE.tenantRevenue.find(r=>r.id===t.id)||{};
    const billed=tr.svc_charge||0;
    const standard=Math.round((BUILDING_CONFIG.std_svc_fee||6.5)*t.m2);
    const diff=billed-standard;
    const diffStr=diff===0?'—':(diff>0?'+$'+diff:'<span style="color:var(--bad)">-$'+Math.abs(diff)+'</span>');
    const perM2=(t.m2>0?(billed/t.m2).toFixed(2):0);
    const warning=parseFloat(perM2)<(BUILDING_CONFIG.std_svc_fee||6.5);
    return `<tr>
      <td class="tdm">${t.name.split(' ').slice(0,2).join(' ')}</td>
      <td style="text-align:right">${t.m2.toLocaleString()}</td>
      <td style="text-align:right;color:${warning?'var(--warn)':'var(--txt)'}">${perM2}</td>
      <td style="text-align:right;font-weight:500">$${billed.toLocaleString()}</td>
      <td style="text-align:right;color:var(--txt3)">$${standard.toLocaleString()}</td>
      <td style="text-align:right">${diffStr}</td>
    </tr>`;
  }).join('');

  el.innerHTML=`
  <div class="ptitle">Accounting & Finance</div>
  <div class="psub" style="display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap">
    <span>Invoice register · Service charge analysis · Revenue breakdown · March 2026</span>
    ${canEdit?`<div style="display:flex;gap:6px;flex-wrap:wrap">
      <button class="fbtn fpri" onclick="genInvoices()">⚡ Generate April Invoices</button>
      <button class="fbtn fsec" onclick="exportLedger()">📊 Export Ledger CSV</button>
      <button class="fbtn fsec" onclick="exportRentRoll()">📋 Rent Roll</button>
      <button class="fbtn fsec" onclick="exportPDF()">🖨️ Print</button>
    </div>`:''}
  </div>

  <!-- Collections KPIs -->
  <div class="krow k4" style="margin-bottom:16px">
    <div class="kpi k-blue"><div class="kl">Invoiced</div><div class="kv">$${Math.round(totalInv/1000)}K</div><div class="kd fl">${STATE.invoices.length} invoices</div></div>
    <div class="kpi k-jade"><div class="kl">Collected</div><div class="kv">$${Math.round(totalPaid/1000)}K</div><div class="kd up">${collRate}% collection rate</div></div>
    <div class="kpi k-warn"><div class="kl">Outstanding</div><div class="kv">$${Math.round(totalPend/1000)}K</div><div class="kd fl">${STATE.invoices.filter(i=>i.status==='pending').length} pending</div></div>
    <div class="kpi k-bad"><div class="kl">Overdue</div><div class="kv">$${Math.round(totalOver/1000)}K</div><div class="kd dn">${STATE.invoices.filter(i=>i.status==='overdue').length} invoices</div></div>
  </div>

  <!-- Revenue breakdown -->
  <div class="g2" style="margin-bottom:16px">
    <div class="card">
      <div class="ct">Revenue by Category — March 2026</div>
      <div style="display:flex;flex-direction:column;gap:8px;margin-top:8px">
        ${[['Base Rent','var(--indigo)',totRent],['Service Charge','var(--jade2)',totalSvcBilled],
           ['Electricity','var(--gold)',totElec],['Water','var(--indigo2,#5B8FCC)',totWater],
           ['Parking','var(--amber)',totParking],['Admin & Other','var(--txt3)',totAdmin+totOther]
          ].map(([label,color,val])=>{
            const pct=totRevenue>0?Math.round(val/totRevenue*100):0;
            return `<div>
              <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px">
                <span style="color:var(--txt2)">${label}</span>
                <span style="color:${color};font-weight:500">$${val.toLocaleString()} <span style="color:var(--txt3)">(${pct}%)</span></span>
              </div>
              <div style="height:5px;background:var(--lift);border-radius:3px;overflow:hidden">
                <div style="height:100%;width:${pct}%;background:${color};border-radius:3px;transition:width .4s"></div>
              </div>
            </div>`;
          }).join('')}
        <div style="border-top:0.5px solid var(--b1);padding-top:8px;display:flex;justify-content:space-between;font-size:12px">
          <span style="color:var(--txt2);font-weight:500">Total Revenue</span>
          <span style="color:var(--gold);font-weight:600">$${totRevenue.toLocaleString()}</span>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="ct">Service Charge Efficiency</div>
      <div style="text-align:center;padding:16px 0">
        <div style="font-size:42px;font-weight:200;color:${svcEff>=95?'var(--ok)':svcEff>=80?'var(--warn)':'var(--bad)'}">${svcEff}<span style="font-size:18px">%</span></div>
        <div style="font-size:11px;color:var(--txt3);margin-top:4px">vs standard $${BUILDING_CONFIG.std_svc_fee}/m²/mo</div>
        <div style="font-size:12px;color:var(--txt2);margin-top:8px">
          Collected: <strong>$${totalSvcBilled.toLocaleString()}</strong> / Target: $${stdSvcTarget.toLocaleString()}
        </div>
      </div>
      <div class="ct" style="margin-top:8px">Per-Tenant Service Charge</div>
      <div style="overflow-x:auto;margin-top:8px">
        <table>
          <thead><tr><th>Tenant</th><th style="text-align:right">m²</th><th style="text-align:right">$/m²</th><th style="text-align:right">Billed</th><th style="text-align:right">Standard</th><th style="text-align:right">Diff</th></tr></thead>
          <tbody>${svcRows}</tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Invoice register -->
  <div class="card">
    <div class="ct" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
      <span>Invoice Register</span>
      <div style="display:flex;gap:8px;align-items:center">
        <div style="position:relative">
          <span style="position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:12px;opacity:.4;pointer-events:none">🔍</span>
          <input id="inv-search" class="finp" placeholder="Tenant, ID, status..." style="padding-left:28px;font-size:11px;width:200px" oninput="filterInvoices(this.value)">
        </div>
        <select id="inv-status-filter" class="finp" style="font-size:11px;padding:4px 8px;width:120px" onchange="filterInvoices()">
          <option value="all">All statuses</option>
          <option value="paid">Paid</option>
          <option value="pending">Pending</option>
          <option value="overdue">Overdue</option>
        </select>
        <span id="inv-count" style="font-size:11px;color:var(--txt3)"></span>
      </div>
    </div>
    <div style="overflow-x:auto;margin-top:10px">
      <table>
        <thead><tr><th>Invoice</th><th>Tenant</th><th>Amount</th><th>Issued</th><th>Due</th><th>Status</th>${canEdit?'<th>Update</th>':''}</tr></thead>
        <tbody id="inv-tbody">${invRows}</tbody>
      </table>
    </div>
  </div>`;
}

function filterInvoices(q){
  if(!CU) return;
  const qVal=(typeof q==='string'?q:(document.getElementById('inv-search')||{value:''}).value).toLowerCase().trim();
  const statusVal=(document.getElementById('inv-status-filter')||{value:'all'}).value;
  const canEdit=canEditAccounting();
  const bm={paid:'bok',pending:'bwarn',overdue:'bbad',cancelled:'brose'};
  let items=STATE.invoices;
  if(statusVal!=='all') items=items.filter(i=>i.status===statusVal);
  if(qVal) items=items.filter(i=>[i.id||'',i.tenant||'',i.status||'',String(i.amount)].join(' ').toLowerCase().includes(qVal));
  const countEl=document.getElementById('inv-count');
  if(countEl) countEl.textContent=items.length!==STATE.invoices.length?items.length+' result'+(items.length!==1?'s':''):'';
  const tbody=document.getElementById('inv-tbody'); if(!tbody) return;
  tbody.innerHTML=items.map(inv=>{
    const bkd=inv.breakdown||{};
    const bkdStr=bkd.rent?'rent $'+Math.round(bkd.rent/1000)+'K'+(bkd.elec?' · elec $'+Math.round(bkd.elec/1000)+'K':''):'—';
    return `<tr>
      <td class="tdm">${inv.id}</td>
      <td><div style="font-size:12px">${inv.tenant.split(' ').slice(0,2).join(' ')}</div><div style="font-size:9px;color:var(--txt3)">${bkdStr}</div></td>
      <td style="font-weight:500">$${inv.amount.toLocaleString()}</td>
      <td style="font-size:11px">${inv.issued}</td>
      <td style="font-size:11px">${inv.due}</td>
      <td><span class="badge ${bm[inv.status]||'bblue'}">${inv.status}</span></td>
      ${canEdit?`<td><select class="finp" style="padding:3px 6px;font-size:10px;width:100px" onchange="updateInvoiceStatus('${inv.id}',this.value)">
        <option value="pending" ${inv.status==='pending'?'selected':''}>Pending</option>
        <option value="paid" ${inv.status==='paid'?'selected':''}>Paid</option>
        <option value="overdue" ${inv.status==='overdue'?'selected':''}>Overdue</option>
      </select></td>`:'<td></td>'}
    </tr>`;
  }).join('');
}

function updateInvoiceStatus(id,val){
  const inv=STATE.invoices.find(i=>i.id===id); if(!inv) return;
  const old=inv.status; inv.status=val;
  addAudit('Invoice status updated',id+': '+old+' → '+val);
  saveData();
  showToast('Invoice '+id+' marked '+val,'ok');
  goto('accounting');
}

function rContracts(el){
  const fullAccess=canFullContracts();
  const mgrView=isMgr();

  const typeLabels={tenant:'Tenant Lease',outsource:'Outsource/Vendor',service:'Service Agreement',nda:'NDA / Confidential'};
  const typeColors={tenant:'#3B72C8',outsource:'#E8A020',service:'#2ECC9A',nda:'#C45A7A'};
  const statusBadgeC=s=>{const m={active:'<span class="badge bok">Active</span>',atrisk:'<span class="badge bbad">At Risk</span>',expired:'<span class="badge brose">Expired</span>',terminated:'<span class="badge bbad">Terminated</span>'};return m[s]||`<span class="badge bblue">${s}</span>`;};

  // For manager: only show contracts where mgrApproved=true, and only key terms (not fullFinancials)
  // Manager can request access to full financials for any contract
  const visibleContracts = mgrView
    ? STATE.contracts.filter(c=>['tenant','service'].includes(c.type))
    : STATE.contracts;

  const pending = STATE.mgrAccessRequests.filter(r=>r.status==='pending');
  const myPendingIds = mgrView ? STATE.mgrAccessRequests.filter(r=>r.requestor===CU.name&&r.status==='pending').map(r=>r.contractId) : [];
  const myApprovedIds = mgrView ? STATE.mgrAccessRequests.filter(r=>r.requestor===CU.name&&r.status==='approved').map(r=>r.contractId) : [];

function filterContracts(val){
  if(!CU) return;
  // Get both type filter value and text search value
  const typeVal = val !== undefined ? val
    : (document.getElementById('ctr-type-filter')||{}).value||'all';
  const searchEl = document.getElementById('ctr-search');
  const q = (searchEl ? searchEl.value : '').toLowerCase().trim();

  const list = document.getElementById('contract-list');
  const noResults = document.getElementById('ctr-no-results');
  if(!list) return;

  const fullAccess = canFullContracts();
  const mgrView = isMgr();
  const typeColors = {tenant:'#3B72C8',outsource:'#E8A020',service:'#2ECC9A',nda:'#C45A7A'};
  const typeLabels = {tenant:'Tenant Lease',outsource:'Outsource/Vendor',service:'Service Agreement',nda:'NDA / Confidential'};
  const statusBadgeC = s=>{
    const m={active:'<span class="badge bok">Active</span>',atrisk:'<span class="badge bbad">At Risk</span>',
             terminated:'<span class="badge bbad">Terminated</span>',renewing:'<span class="badge bwarn">Renewing</span>'};
    return m[s]||`<span class="badge bblue">${s}</span>`;
  };

  // Source contracts
  let source = mgrView
    ? STATE.contracts.filter(c=>['tenant','service'].includes(c.type)&&c.mgrApproved)
    : STATE.contracts;

  // Filter by type
  if(typeVal && typeVal!=='all') source = source.filter(c=>c.type===typeVal);

  // Filter by search text
  if(q){
    source = source.filter(c=>{
      const hay=[c.id,c.party,c.category,c.status,c.type,
                 c.startDate||'',c.endDate||'',
                 String(c.monthlyValue||''),
                 c.keyTerms||'',c.escalation||'',
                 (c.changeLog||[]).map(l=>l.note).join(' ')
                ].join(' ').toLowerCase();
      return hay.includes(q);
    });
  }

  // Show count
  const countEl = document.getElementById('ctr-count');
  if(countEl) countEl.textContent = (q||typeVal!=='all') ? `${source.length} result${source.length!==1?'s':''}` : '';

  if(source.length===0){
    list.innerHTML='';
    if(noResults) noResults.style.display='block';
    return;
  }
  if(noResults) noResults.style.display='none';

  // Render matching cards
  // Re-use the full render logic from rContracts
  const myApprovedIds = mgrView ? STATE.mgrAccessRequests.filter(r=>r.requestor===CU.name&&r.status==='approved').map(r=>r.contractId) : [];

  list.innerHTML = source.map(c=>{
    const tc = typeColors[c.type]||'#7A9BB8';
    const canSeeFull = fullAccess || myApprovedIds.includes(c.id);
    // Highlight matched text if searching
    const highlight = (str)=>{
      if(!q) return str;
      const re = new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
      return str.replace(re,'<mark style="background:rgba(200,168,75,.35);color:var(--gold);border-radius:2px;padding:0 1px">$1</mark>');
    };
    return `<div style="background:var(--card2);border:0.5px solid var(--b2);border-radius:9px;padding:14px 16px;margin-bottom:11px;border-left:3px solid ${tc}">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:5px;flex-wrap:wrap">
        <span style="font-size:10px;background:${tc}20;color:${tc};padding:2px 8px;border-radius:4px">${highlight(c.id)}</span>
        <span style="font-size:10px;background:${tc}15;color:${tc};padding:2px 8px;border-radius:4px">${typeLabels[c.type]||c.type}</span>
        ${statusBadgeC(c.status)}
        ${canSeeFull?`<button class="fbtn fsec" style="font-size:10px;padding:2px 8px;margin-left:auto" onclick="editContractInline('${c.id}')">✎ Edit</button>`:''}
      </div>
      <div style="font-size:13px;font-weight:500;color:var(--txt)">${highlight(c.party)}</div>
      <div style="font-size:11px;color:var(--txt3);margin-top:3px">${highlight(c.category)} · ${c.startDate||'—'} → ${c.endDate||'—'} · ${c.monthlyValue>0?'$'+c.monthlyValue.toLocaleString()+'/mo':''}</div>
      ${c.keyTerms?`<div style="font-size:11px;color:var(--txt2);margin-top:5px;line-height:1.4">${highlight(c.keyTerms)}</div>`:''}
      ${canSeeFull&&c.fullFinancials?`<div style="font-size:11px;color:var(--ok);margin-top:4px;opacity:.8">${c.fullFinancials}</div>`:''}
      <div id="cedit-${c.id}"></div>
    </div>`;
  }).join('');
}


  const fullAccess=canFullContracts();

function requestContractAccess(contractId, party){
  const already=STATE.mgrAccessRequests.find(r=>r.contractId===contractId&&r.requestor===CU.name&&r.status==='pending');
  if(already){alert('Request already submitted and pending GD approval.');return;}
  const reason=prompt(`Reason for requesting full financial access to "${party}" contract:`);
  if(!reason)return;
  const newReq={
    id:'REQ-00'+(STATE.mgrAccessRequests.length+1),
    requestor:CU.name,role:CU.role_obj.label,
    contractId,contractParty:party,reason,
    status:'pending',requestDate:new Date().toISOString().slice(0,10),
    approvedBy:'',approvedDate:'',
  };
  STATE.mgrAccessRequests.push(newReq);
  addAudit('Requested contract access',`${CU.name} requested full financial access to ${contractId} (${party})`);
  alert('Request submitted. Awaiting General Director approval.');
  goto('contracts');
}

function approveRequest(reqId){
  const r=STATE.mgrAccessRequests.find(x=>x.id===reqId);if(!r)return;
  r.status='approved';r.approvedBy=CU.name;r.approvedDate=new Date().toISOString().slice(0,10);
  // grant mgrApproved on contract
  const c=STATE.contracts.find(x=>x.id===r.contractId);
  if(c){c.mgrApproved=true;c.mgrApprovedBy=CU.name;c.mgrApprovedDate=r.approvedDate;}
  addAudit('Approved contract access request',`${r.requestor} granted access to ${r.contractId} (${r.contractParty})`);
  goto('contracts');
}

function denyRequest(reqId){
  const r=STATE.mgrAccessRequests.find(x=>x.id===reqId);if(!r)return;
  r.status='denied';r.approvedBy=CU.name;r.approvedDate=new Date().toISOString().slice(0,10);
  addAudit('Denied contract access request',`${r.requestor} denied access to ${r.contractId}`);
  goto('contracts');
}

function toggleMgrApproval(contractId){
  const c=STATE.contracts.find(x=>x.id===contractId);if(!c)return;
  c.mgrApproved=!c.mgrApproved;
  if(c.mgrApproved){c.mgrApprovedBy=CU.name;c.mgrApprovedDate=new Date().toISOString().slice(0,10);}
  addAudit(`${c.mgrApproved?'Granted':'Revoked'} manager view`,`${contractId} (${c.party})`);
  goto('contracts');
}

function saveContractEdit(id){
  const c=STATE.contracts.find(x=>x.id===id); if(!c) return;
  const oldStatus=c.status, oldParty=c.party;

  // ── Required reason / note ─────────────────────────────────────
  const note=(document.getElementById(`ce-note-${id}`)||{}).value?.trim()||'';
  if(!note){
    alert('A reason / note is required to save any contract change.');
    (document.getElementById(`ce-note-${id}`)||{}).focus?.();
    return;
  }

  // ── Read all editable fields ───────────────────────────────────
  c.party      = (document.getElementById(`ce-party-${id}`)||{}).value||c.party;
  c.category   = (document.getElementById(`ce-cat-${id}`)||{}).value||c.category;
  const newRentM2=parseFloat((document.getElementById(`ce-rentm2-${id}`)||{}).value);
  if(!isNaN(newRentM2)&&c.type==='tenant'){ c.rentPerM2=newRentM2; c.monthlyValue=Math.round(newRentM2*(c.m2||0)); }
  else { c.monthlyValue=parseInt((document.getElementById(`ce-val-${id}`)||{}).value)||c.monthlyValue; }
  c.startDate  = (document.getElementById(`ce-start-${id}`)||{}).value||c.startDate;
  c.endDate    = (document.getElementById(`ce-end-${id}`)||{}).value||c.endDate;
  c.signedDate = (document.getElementById(`ce-signed-${id}`)||{}).value||c.signedDate;
  const newStatus=(document.getElementById(`ce-status-${id}`)||{}).value||c.status;
  c.renewalClause=(document.getElementById(`ce-renewal-${id}`)||{}).value||c.renewalClause;
  c.escalation = (document.getElementById(`ce-esc-${id}`)||{}).value||c.escalation;
  const newSvcVal=parseFloat((document.getElementById(`ce-svc-${id}`)||{}).value);
  if(!isNaN(newSvcVal)&&c.type==='tenant') c.svcChargePerM2=newSvcVal;
  c.keyTerms   = (document.getElementById(`ce-terms-${id}`)||{}).value||c.keyTerms;
  c.fullFinancials=(document.getElementById(`ce-fin-${id}`)||{}).value||c.fullFinancials;
  c.signedBy   = (document.getElementById(`ce-sigby-${id}`)||{}).value||c.signedBy;
  const attStr = (document.getElementById(`ce-att-${id}`)||{}).value||'';
  c.attachments=attStr.split(',').map(s=>s.trim()).filter(Boolean);

  // ── Handle file attachment (base64) ───────────────────────────
  const fileInput=document.getElementById(`ce-file-${id}`);
  const fileAttachment=window[`_ctr_file_${id}`]||null; // set by onFileChange handler

  // ── Build change summary for log ──────────────────────────────
  const changes=[];
  if(newStatus!==oldStatus) changes.push(`status: ${oldStatus}→${newStatus}`);
  if(!isNaN(newRentM2)&&newRentM2!==(c.rentPerM2||0)) changes.push(`rent: $${c.rentPerM2||0}→$${newRentM2}/m²`);
  if(!isNaN(newSvcVal)&&newSvcVal!==(c.svcChargePerM2||0)) changes.push(`svc: $${c.svcChargePerM2||0}→$${newSvcVal}/m²`);

  // ── Log to contract changeLog ──────────────────────────────────
  c.changeLog=c.changeLog||[];
  c.changeLog.unshift({
    date:new Date().toISOString().slice(0,16).replace('T',' '),
    user:CU.name, role:CU.role_obj?.label||CU.role,
    oldStatus, newStatus,
    changes:changes.length?changes.join(' · '):'General edit',
    note,
    file:fileAttachment?{name:fileAttachment.name,data:fileAttachment.data}:null,
  });

  // ── Now apply status ───────────────────────────────────────────
  const isTerminating = newStatus==='terminated' && oldStatus!=='terminated';
  c.status=newStatus;

  // ═══════════════════════════════════════════════════════════════
  // CASCADE: propagate to all linked STATE objects
  // ═══════════════════════════════════════════════════════════════
  if(c.type==='tenant'){
    const t=STATE.tenants.find(x=>
      x.name===c.party||
      (c.party||'').toLowerCase().includes(x.name.split(' ')[0].toLowerCase())||
      x.name.toLowerCase().includes((c.party||'').split(' ')[0].toLowerCase()));

    if(t){
      const now=new Date().toISOString().slice(0,7);
      const oldRent=t.rent, oldSvc=t.svcPerM2||0, oldM2=t.m2;

      if(isTerminating){
        // ── Full termination cascade ─────────────────────────────
        t.status='terminated'; t.rent=0; t.svcPerM2=0;
        if(c.endDate) t.expiry=c.endDate.slice(0,7);

        // priceHistory
        t.priceHistory=t.priceHistory||[];
        t.priceHistory.push({date:now,m2:t.m2,rent:0,svcPerM2:0,
          reason:`CONTRACT TERMINATED — ${note}`,type:'termination',pct:null,changedBy:CU.name});

        // tenantRevenue → zero everything
        const tr=STATE.tenantRevenue.find(r=>r.id===t.id);
        if(tr){tr.rent=0;tr.svc_charge=0;tr.elec=0;tr.water=0;tr.parking_car=0;tr.parking_bike=0;tr.admin_fee=0;tr.other=0;}

        // parking bays → release
        STATE.parking.forEach(p=>{if(p.tenant===t.name){p.assigned=false;p.tenant='';p.plate='';p.monthly=0;}});

        // pending invoices → overdue
        STATE.invoices.filter(i=>i.tenant===t.name&&i.status==='pending').forEach(i=>{i.status='overdue';});

        addAudit('⚠ CONTRACT TERMINATED',
          `${c.id} (${c.party}) · Fl ${t.floors} · ${t.m2}m² · by ${CU.name} · "${note.slice(0,80)}"`);
        showToast(`✓ Contract terminated — floor map, financials & all pages updated`,'bad');

      } else {
        // ── Non-termination: update rent/svc/dates if changed ───
        const rentChanged=!isNaN(newRentM2)&&newRentM2!==t.rent;
        const svcChanged=!isNaN(newSvcVal)&&newSvcVal!==t.svcPerM2;
        const m2Changed=c.m2&&c.m2!==t.m2;

        if(rentChanged) t.rent=newRentM2;
        if(svcChanged)  t.svcPerM2=newSvcVal;
        if(m2Changed)   t.m2=c.m2;
        if(c.endDate)   t.expiry=c.endDate.slice(0,7);
        if(c.startDate) t.start=c.startDate.slice(0,7);

        // Status is ONLY changed via Contract page — not allowed here
        // (tenantDetail status dropdown is display-only in non-termination flow)
        // Sync status from contract to tenant
        const statusMap={active:'active',renewing:'renewing',atrisk:'atrisk',
                         partial:'partial',expired:'terminated',terminated:'terminated'};
        if(newStatus!==oldStatus) t.status=statusMap[newStatus]||newStatus;

        if(rentChanged||svcChanged||m2Changed){
          t.priceHistory=t.priceHistory||[];
          t.priceHistory.push({date:now,m2:t.m2,rent:t.rent,svcPerM2:t.svcPerM2,
            reason:`Contract update (${c.id}) — ${note}`,type:'adjustment',pct:null,changedBy:CU.name});
        }

        // tenantRevenue sync
        const tr=STATE.tenantRevenue.find(r=>r.id===t.id);
        if(tr){tr.rent=Math.round(t.rent*t.m2);tr.svc_charge=Math.round((t.svcPerM2||0)*t.m2);}

        addAudit('Contract updated→tenant synced',
          `${c.id}: ${changes.length?changes.join(', '):'fields updated'} · "${note.slice(0,60)}"`);
        showToast(`Contract ${id} saved — tenant & financials updated`,'ok');
      }
    } else {
      addAudit('Contract saved (no linked tenant)',`${c.id}: ${changes.join(', ')||'edit'} · "${note.slice(0,60)}"`);
      showToast(`Contract ${id} saved`,'ok');
    }
  } else {
    // Non-tenant contract (service/outsource/NDA)
    addAudit('Contract saved',`${c.id} (${c.party}): ${changes.join(', ')||'edit'} · "${note.slice(0,60)}"`);
    showToast(`Contract ${id} saved`,'ok');
  }

  // Clear file cache
  delete window[`_ctr_file_${id}`];
  goto('contracts');
}

function ctrFileChange(id, input){
  const file=input.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    window[`_ctr_file_${id}`]={name:file.name,size:file.size,data:e.target.result};
    const lbl=document.getElementById(`ce-file-lbl-${id}`);
    if(lbl) lbl.textContent='📎 '+file.name+' ('+Math.round(file.size/1024)+'KB)';
  };
  reader.readAsDataURL(file);
}

function deleteContract(id){
  const c=STATE.contracts.find(x=>x.id===id); if(!c) return;
  // Only CEO and GD can delete
  if(!['ceo','gd'].includes(CU.role)){showToast('Only CEO or GD can delete contracts','bad');return;}
  const ok=confirm(`Delete contract ${id} — "${c.party}"?\n\nThis action cannot be undone. The contract record will be permanently removed.\n\nProceed?`);
  if(!ok) return;
  STATE.contracts=STATE.contracts.filter(x=>x.id!==id);
  addAudit('Deleted contract '+id,`${c.party} (${c.type}) — permanently removed by ${CU.name}`);
  showToast('Contract '+id+' deleted','warn');
  goto('contracts');
}

function saveNewContract(){
  const party=(document.getElementById('nc-party')||{}).value?.trim();
  if(!party){alert('Party name required');return;}
  const note=(document.getElementById('nc-note')||{}).value?.trim();
  if(!note){alert('Reason / note is required.');(document.getElementById('nc-note')||{}).focus?.();return;}

  const type=(document.getElementById('nc-type')||{}).value||'service';
  const prefix={tenant:'CTR-T',outsource:'CTR-O',service:'CTR-S',nda:'CTR-N'}[type]||'CTR-X';
  const existing=STATE.contracts.filter(c=>c.id.startsWith(prefix));
  const newId=prefix+'-'+(existing.length+1).toString().padStart(3,'0');

  const floor     = (document.getElementById('nc-floor')||{}).value||'';
  const m2        = parseInt((document.getElementById('nc-m2')||{}).value)||0;
  const rentPerM2 = parseFloat((document.getElementById('nc-rentm2')||{}).value)||0;
  const svcPerM2  = parseFloat((document.getElementById('nc-svc')||{}).value)||6.5;
  const industry  = (document.getElementById('nc-industry')||{}).value||'Other';
  const escalation= (document.getElementById('nc-escalation')||{}).value||'TBD';
  const renewal   = (document.getElementById('nc-renewal')||{}).value||'';
  const startDate = (document.getElementById('nc-start')||{}).value||'';
  const endDate   = (document.getElementById('nc-end')||{}).value||'';
  const signedDate= (document.getElementById('nc-signed')||{}).value||'';
  const status    = (document.getElementById('nc-status')||{}).value||'active';
  const monthlyVal= type==='tenant'?Math.round(rentPerM2*m2):(parseInt((document.getElementById('nc-val')||{}).value)||0);

  const newContract={
    id:newId,type,party,
    svcChargePerM2:type==='tenant'?svcPerM2:0,
    category:(document.getElementById('nc-cat')||{}).value||'',
    floor,m2,rentPerM2,monthlyValue:monthlyVal,
    startDate,endDate,signedDate,status,
    renewalClause:renewal,escalation,
    keyTerms:(document.getElementById('nc-terms')||{}).value||'',
    fullFinancials:(document.getElementById('nc-financials')||{}).value||'',
    signedBy:(document.getElementById('nc-signers')||{}).value||'',
    parties:party+' / Leadvisors Tower JSC',
    attachments:[],accessLevel:'full',
    mgrApproved:false,mgrApprovedBy:'',mgrApprovedDate:'',
    changeLog:[{date:new Date().toISOString().slice(0,16).replace('T',' '),
      user:CU.name,role:CU.role_obj?.label||CU.role,
      oldStatus:'—',newStatus:status,changes:'New contract created',note,file:null}],
  };
  STATE.contracts.push(newContract);

  if(type==='tenant'&&m2>0&&rentPerM2>0){
    // ── Cascade → STATE.tenants (Floor Map, Tenants page, Overview) ──
    const startYM=startDate?startDate.slice(0,7):'';
    const endYM=endDate?endDate.slice(0,7):'';
    const newTid=Math.max(...STATE.tenants.map(t=>t.id))+1;
    // ── Handle vacant placeholder on this floor ────────────────────
    // Normalize floor ID for matching
    const floorIds=floor.match(/^(\d+)-(\d+)$/)
      ? Array.from({length:parseInt(floor.split('-')[1])-parseInt(floor.split('-')[0])+1},
          (_,i)=>(parseInt(floor.split('-')[0])+i)+'F')
      : [/^\d+$/.test(floor)?floor+'F':floor];
    floorIds.forEach(fid=>{
      // Find any vacant placeholder on this floor
      const vacIdx=STATE.tenants.findIndex(t=>
        t.industry==='Vacant'&&t.status==='terminated'&&
        (t.floors===fid.replace('F','')||t.floors===fid));
      if(vacIdx>=0){
        const vacTenant=STATE.tenants[vacIdx];
        const floorCap=BUILDING_CONFIG.floor_areas[fid]||vacTenant.m2;
        const remaining=floorCap-m2/floorIds.length;
        if(remaining<=0){
          // Floor fully leased — remove vacant placeholder
          STATE.tenants.splice(vacIdx,1);
        } else {
          // Partial — shrink placeholder to remaining area
          vacTenant.m2=Math.round(remaining);
        }
      }
      // Update BUILDING_CONFIG floor_areas if not already set
      if(!BUILDING_CONFIG.floor_areas[fid]&&m2>0){
        BUILDING_CONFIG.floor_areas[fid]=Math.round(m2/floorIds.length);
      }
    });

    STATE.tenants.push({
      id:newTid,name:party,floors:floor,m2,rent:rentPerM2,svcPerM2,
      start:startYM,expiry:endYM,industry,status:'active',
      priceHistory:[{date:startYM||new Date().toISOString().slice(0,7),
        m2,rent:rentPerM2,svcPerM2,
        reason:'New contract signed — '+note,
        type:'initial',pct:null,changedBy:CU.name}],
    });
    // ── Cascade → tenantRevenue (Financial, Accounting svc analysis) ──
    STATE.tenantRevenue.push({
      id:newTid,name:party,
      rent:Math.round(rentPerM2*m2),
      svc_charge:Math.round(svcPerM2*m2),
      elec:Math.round(m2*3.2),water:Math.round(m2*0.28),
      parking_car:0,parking_bike:0,
      admin_fee:Math.round(m2*0.3),other:0,
      notes:'New lease '+newId,
    });
    addAudit('New tenant lease',
      newId+' — '+party+' · Fl '+floor+' · '+m2+'m² · $'+rentPerM2+'/m² · svc $'+svcPerM2+'/m² · "'+note+'"');
    showToast('✓ '+party+' added — Tenants, Floor Map, Financial & Overview updated','ok');
  } else {
    addAudit('New contract '+newId,party+' — '+type+' · "'+note+'"');
    showToast('✓ Contract '+newId+' saved','ok');
  }
  goto('contracts');
}

function itSaveAccess(username){
  const acc=ACCOUNTS.find(a=>a.u===username); if(!acc) return;
  // IT cannot grant/change access for senior roles (ceo, gd, director)
  if(!canITGrant(acc.role)){
    showToast('Cannot modify access for senior roles (Chairman, GD, Director)','bad');
    return;
  }
  const r=ROLES[acc.role]||{tabs:[]};
  const baseTabs=r.tabs||[];
  const GRANTABLE=['overview','floormap','tenants','financial','operations','accounting','contracts','portal','forecast','pricelog'];
  const newExtra=GRANTABLE.filter(tid=>{
    if(baseTabs.includes(tid)) return false; // skip base tabs
    const cb=document.getElementById('acc-'+tid);
    return cb&&cb.checked;
  });
  const added=newExtra.filter(t=>!(acc.extraTabs||[]).includes(t));
  const removed=(acc.extraTabs||[]).filter(t=>!newExtra.includes(t));
  acc.extraTabs=newExtra;
  // If this user is currently logged in, update their live tab list
  if(CU&&CU.u===username){
    CU.role_obj={...ROLES[acc.role],tabs:getEffectiveTabs(acc)};
    buildShell();
  }
  const changes=[];
  if(added.length) changes.push(`Granted: ${added.map(t=>TAB_NAMES[t]).join(', ')}`);
  if(removed.length) changes.push(`Revoked: ${removed.map(t=>TAB_NAMES[t]).join(', ')}`);
  if(changes.length){
    addAudit('IT: access changes for '+acc.name, changes.join(' · '));
    showToast('Access updated for '+acc.name,'ok');
  }
  const saved=document.getElementById('it-acc-saved');
  if(saved){saved.classList.add('show');setTimeout(()=>saved.classList.remove('show'),2500);}
  // Refresh member list to show updated extra tabs
  setTimeout(()=>rIT(document.querySelector('.pg')),300);
}

        </div>
        <div style="font-size:10px;color:var(--txt3);margin-bottom:4px">${p.contact} &nbsp;·&nbsp; Fl ${p.floors} &nbsp;·&nbsp; ${p.m2Req} m² &nbsp;·&nbsp; $${p.budgetPerM2}/m²</div>
        <div style="font-size:10px;color:var(--txt2);margin-bottom:6px;line-height:1.4">${p.notes.slice(0,80)}${p.notes.length>80?'…':''}</div>
        <div style="font-size:10px;color:var(--txt3);margin-bottom:${canEdit?'8px':'0'}">Next: ${p.nextActionNote} · ${p.nextAction}</div>

          ${(()=>{
            const stageOrder=['prospect','visiting','proposal','negotiating','signed'];
            const curIdx=stageOrder.indexOf(stage);

            const nextStages=stageOrder.slice(curIdx+1,curIdx+3);
            return nextStages.map(s=>`<button class="fbtn fsec" style="font-size:9px;padding:2px 7px;white-space:nowrap" onclick="movePipeline('${p.id}','${s}')">${stageLabel[s]}</button>`).join('');

function movePipeline(id,stage){
  const p=STATE.leasingPipeline.find(x=>x.id===id);if(!p)return;
  const old=p.stage; p.stage=stage;

  p.probability=probMap[stage]||p.probability;
  addAudit('Leasing pipeline update',`${p.company}: ${old} → ${stage}`);
  goto('leasing_crm');
}

      <thead><tr><th>ID</th><th>System</th><th>Frequency</th><th>Last Done</th><th>Next Due</th><th>Status</th><th>Assigned</th>${canEdit?'<th>Actions</th>':''}</tr></thead>
      <tbody id="pm-tbody"></tbody>
    </table>
  </div>`;

  filterPMCal();

function filterPMCal(){
  if(!CU) return;
  const q=(document.getElementById('pm-search')||{value:''}).value.toLowerCase().trim();
  const month=(document.getElementById('pm-month')||{value:'all'}).value;
  const status=(document.getElementById('pm-status')||{value:'all'}).value;
  const canEdit=canEditPMCal();
  let items=STATE.pmSchedule;
  if(month!=='all') items=items.filter(p=>p.nextDue&&p.nextDue.startsWith(month));
  if(status!=='all') items=items.filter(p=>p.status===status);
  if(q) items=items.filter(p=>[p.id||'',p.system||'',p.freq||'',p.assignedTo||'',p.status||''].join(' ').toLowerCase().includes(q));
  const countEl=document.getElementById('pm-count');
  if(countEl) countEl.textContent=items.length!==STATE.pmSchedule.length?`${items.length} result${items.length!==1?'s':''}`:''
  const tbody=document.getElementById('pm-tbody'); if(!tbody) return;
  tbody.innerHTML=items.map(p=>{
    const isOver=p.status==='overdue';
    const isDue=p.status==='scheduled'&&p.nextDue<='2026-04-15';
    const rowBg=isOver?'rgba(226,75,74,.1)':isDue?'rgba(232,160,32,.06)':'';
    const statusBadge=isOver?'<span class="badge bbad">Overdue</span>':
      p.status==='completed'?'<span class="badge bok">Done</span>':
      isDue?'<span class="badge bwarn">Due Soon</span>':'<span class="badge bblue">Scheduled</span>';
    return `<tr style="background:${rowBg}">
      <td class="tdm">${p.id}</td>
      <td class="tdm">${p.system}</td>
      <td style="font-size:11px">${p.freq}</td>
      <td style="font-size:11px;color:var(--txt3)">${p.lastDone||'—'}</td>
      <td style="font-weight:500;color:${isOver?'var(--bad)':isDue?'var(--warn)':'var(--txt)'}">${p.nextDue||'—'}</td>
      <td>${statusBadge}</td>
      <td style="font-size:11px;color:var(--txt3)">${p.assignedTo||'—'}</td>
      ${canEdit?`<td>
        <select class="finp" style="font-size:10px;padding:2px 6px;width:110px" onchange="updatePMStatus('${p.id}',this.value)">
          <option ${p.status==='scheduled'?'selected':''} value="scheduled">Scheduled</option>
          <option ${p.status==='completed'?'selected':''} value="completed">Completed</option>
          <option ${p.status==='overdue'?'selected':''} value="overdue">Overdue</option>
        </select>
      </td>`:'<td></td>'}
    </tr>`;
  }).join('');
}

function markPMDone(id){
  const p=STATE.pmSchedule.find(x=>x.id===id);if(!p)return;
  const today=new Date().toISOString().slice(0,10);
  p.lastDone=today; p.status='scheduled';
  // Calculate next due based on frequency
  const d=new Date();
  const freq=p.freq.toLowerCase();
  if(freq.includes('weekly')) d.setDate(d.getDate()+7);
  else if(freq.includes('monthly')) d.setMonth(d.getMonth()+1);
  else if(freq.includes('quarterly')) d.setMonth(d.getMonth()+3);
  else if(freq.includes('semi')) d.setMonth(d.getMonth()+6);
  else d.setFullYear(d.getFullYear()+1);
  p.nextDue=d.toISOString().slice(0,10);
  addAudit('PM task completed',`${p.id}: ${p.system} — next due ${p.nextDue}`);
  showToast(p.system+' marked done. Next: '+p.nextDue,'ok');
  goto('pm_cal');
}

function editUtility(floor){

        <div id="prev-water-rev" style="font-size:16px;font-weight:300;color:var(--gold)">$${Math.round(u.water*waterBill)}</div></div>
      <div><div style="font-size:9px;color:var(--txt3);text-transform:uppercase;margin-bottom:4px">Water Cost</div>
        <div id="prev-water-cost" style="font-size:16px;font-weight:300;color:var(--warn)">$${Math.round(u.water*waterCost)}</div></div>
      <div><div style="font-size:9px;color:var(--txt3);text-transform:uppercase;margin-bottom:4px">Water Margin</div>
        <div id="prev-water-margin" style="font-size:16px;font-weight:300;color:var(--ok)">$${Math.round(u.water*(waterBill-waterCost))}</div></div>
    </div>
    <div class="fbar">
      <button class="fbtn fpri" onclick="saveUtility('${floor}')">💾 Save & Update Financial</button>
      <button class="fbtn fsec" onclick="document.getElementById('util-form').innerHTML=''">Cancel</button>
    </div>
  </div>`;
}

function calcUtilPreview(){
  const kwh=parseFloat(document.getElementById('eu-kwh')?.value)||0;
  const water=parseFloat(document.getElementById('eu-water')?.value)||0;
  const cr=parseFloat(document.getElementById('eu-cost-rate')?.value)||0.10;
  const br=parseFloat(document.getElementById('eu-bill-rate')?.value)||0.15;
  const wcr=parseFloat(document.getElementById('eu-wcost-rate')?.value)||3;
  const wbr=parseFloat(document.getElementById('eu-wbill-rate')?.value)||5;
  const s=id=>{ const el=document.getElementById(id); if(el) el.textContent='$'+Math.round(arguments[0]); };
  const set=(id,v)=>{ const el=document.getElementById(id); if(el) el.textContent='$'+Math.round(v); };
  set('prev-elec-rev',kwh*br); set('prev-elec-cost',kwh*cr); set('prev-elec-margin',kwh*(br-cr));
  set('prev-water-rev',water*wbr); set('prev-water-cost',water*wcr); set('prev-water-margin',water*(wbr-wcr));
}

function saveUtility(floor){
  const u=STATE.utilities.find(x=>x.floor===floor);if(!u)return;
  const kwh=parseInt((document.getElementById('eu-kwh')||{}).value)||u.kwh;
  const water=parseInt((document.getElementById('eu-water')||{}).value)||u.water;
  const month=(document.getElementById('eu-month')||{}).value||u.month;
  const costRate=parseFloat((document.getElementById('eu-cost-rate')||{}).value)||0.10;
  const billRate=parseFloat((document.getElementById('eu-bill-rate')||{}).value)||0.15;
  const wCostRate=parseFloat((document.getElementById('eu-wcost-rate')||{}).value)||3;
  const wBillRate=parseFloat((document.getElementById('eu-wbill-rate')||{}).value)||5;

  // Update utility record
  u.kwh=kwh; u.water=water; u.month=month;
  u.cost_rate=costRate; u.billing_rate=billRate;
  u.water_cost_rate=wCostRate; u.water_bill_rate=wBillRate;
  // cost = what landlord pays (expense)
  u.cost_elec=Math.round(kwh*costRate);
  u.cost_water=Math.round(water*wCostRate);
  // billing = revenue from tenant (income)
  u.bill_elec=Math.round(kwh*billRate);
  u.bill_water=Math.round(water*wBillRate);
  u.margin_elec=u.bill_elec-u.cost_elec;
  u.margin_water=u.bill_water-u.cost_water;

  // ── Cascade → tenantRevenue (drives Financial, Accounting svc analysis) ──
  // Find all utility records for this tenant and sum billing
  const allTenantUtils=STATE.utilities.filter(ux=>ux.tenant===u.tenant);
  const totalBillElec=allTenantUtils.reduce((s,ux)=>s+(ux.bill_elec||Math.round(ux.kwh*(ux.billing_rate||0.15))),0);
  const totalBillWater=allTenantUtils.reduce((s,ux)=>s+(ux.bill_water||Math.round(ux.water*(ux.water_bill_rate||5))),0);
  const tr=STATE.tenantRevenue.find(r=>r.name===u.tenant||(u.tenant&&r.name.includes(u.tenant.split(' ')[0])));
  if(tr){
    tr.elec=totalBillElec;
    tr.water=totalBillWater;
  }

  addAudit('Utility reading updated',
    floor+' ('+u.tenant+'): '+kwh+'kWh → billed $'+u.bill_elec+' (cost $'+u.cost_elec+') · '+
    water+'m³ water → billed $'+u.bill_water+' (cost $'+u.cost_water+')');
  showToast('✓ '+floor+' readings saved — Financial & Accounting updated','ok');
  goto('utilities');
}

function getNotifications(){
  const notifs=[];
  const today='2026-03-15';
  // Expiring leases
  STATE.tenants.forEach(t=>{
    if(t.status==='terminated') return;
    const diff=Math.round((new Date(t.expiry+'-01')-new Date(today))/(1000*60*60*24*30));
    if(diff<=1)  notifs.push({level:'high',icon:'🔴',title:`${t.name} — lease expires this month!`,sub:`Floor ${t.floors} · ${t.m2.toLocaleString()} m²`,tab:'tenants',tid:t.id});
    else if(diff<=3)  notifs.push({level:'high',icon:'🔴',title:`${t.name} — expires in ~${diff} months`,sub:`Floor ${t.floors} · Action needed`,tab:'tenants',tid:t.id});
    else if(diff<=6)  notifs.push({level:'med',icon:'🟡',title:`${t.name} — expires in ${diff} months`,sub:`Floor ${t.floors} · Begin renewal talks`,tab:'tenants',tid:t.id});
  });
  // Overdue PM
  STATE.pmSchedule.filter(p=>p.status==='overdue').forEach(p=>{
    notifs.push({level:'high',icon:'🔴',title:`PM Overdue — ${p.system}`,sub:`Was due ${p.nextDue} · Assigned: ${p.assigned}`,tab:'pm_cal'});
  });
  // Overdue invoices
  STATE.invoices.filter(i=>i.status==='overdue').forEach(i=>{
    notifs.push({level:'high',icon:'🔴',title:`Invoice overdue — ${i.tenant}`,sub:`${i.id} · $${i.amount.toLocaleString()} due ${i.due}`,tab:'accounting'});
  });
  // At-risk tenants
  STATE.tenants.filter(t=>t.status==='atrisk').forEach(t=>{
    notifs.push({level:'high',icon:'🔴',title:`At-risk tenant — ${t.name}`,sub:`Floor ${t.floors} · Renewal uncertainty`,tab:'tenants',tid:t.id});
  });
  // Pending amenity bookings
  STATE.amenityBookings.filter(b=>b.status==='pending').forEach(b=>{
    notifs.push({level:'med',icon:'🟡',title:`Pending booking — ${b.purpose}`,sub:`${b.tenant} · ${b.date} ${b.timeFrom}`,tab:'amenity'});
  });
  // Leasing next actions overdue
  STATE.leasingPipeline.filter(p=>p.nextAction&&p.nextAction<today&&!['signed','lost'].includes(p.stage)).forEach(p=>{
    notifs.push({level:'med',icon:'🟡',title:`Action overdue — ${p.company}`,sub:`${p.nextActionNote} was due ${p.nextAction}`,tab:'leasing_crm'});
  });
  return notifs.sort((a,b)=>a.level==='high'?-1:1);
}

function showNotificationCenter(){
  const notifs=getNotifications();
  const existing=document.getElementById('notif-panel');
  if(existing){existing.remove();return;}
  const panel=document.createElement('div');
  panel.id='notif-panel';
  panel.style.cssText='position:fixed;top:52px;right:16px;width:360px;max-height:70vh;overflow-y:auto;background:#1E2A3A;border:0.5px solid rgba(120,160,190,.25);border-radius:10px;z-index:200;box-shadow:0 8px 32px rgba(0,0,0,.5)';
  const lc={high:'#E24B4A',med:'#E8A020',low:'#3B72C8'};
  panel.innerHTML=`
    <div style="padding:12px 16px;border-bottom:0.5px solid rgba(120,160,190,.15);display:flex;justify-content:space-between;align-items:center">
      <span style="font-size:12px;font-weight:500;color:#D8E6F0">Notifications (${notifs.length})</span>
      <button onclick="document.getElementById('notif-panel').remove()" style="background:none;border:none;color:#7A9BB8;cursor:pointer;font-size:13px">✕</button>

function openSearch(){
  if(document.getElementById('search-modal')) return;
  const m=document.createElement('div');
  m.id='search-modal';
  m.style.cssText='position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.7);display:flex;align-items:flex-start;justify-content:center;padding-top:12vh;backdrop-filter:blur(4px)';
  m.onclick=e=>{if(e.target===m)closeSearch();};
  m.innerHTML=`
    <div style="width:min(640px,92vw);background:var(--card);border:0.5px solid var(--b1);border-radius:12px;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,.5)">
      <div style="display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:0.5px solid var(--b1)">
        <span style="font-size:16px;opacity:.5">🔍</span>
        <input id="search-input" placeholder="Search tenants, floors, contracts, tickets, amounts..." autofocus
          style="flex:1;background:none;border:none;outline:none;font-size:14px;color:var(--txt);font-family:DM Sans,sans-serif"
          oninput="runSearch(this.value)">
        <span style="font-size:10px;color:var(--txt3);padding:2px 6px;background:var(--lift);border-radius:4px;cursor:pointer" onclick="closeSearch()">ESC</span>
      </div>
      <div id="search-results" style="max-height:420px;overflow-y:auto;padding:8px"></div>
      <div style="padding:8px 16px;border-top:0.5px solid var(--b1);font-size:10px;color:var(--txt3);display:flex;gap:16px">
        <span>↑↓ Navigate</span><span>↵ Open</span><span>ESC Close</span>
      </div>
    </div>`;
  document.body.appendChild(m);
  setTimeout(()=>{ const inp=document.getElementById('search-input'); if(inp)inp.focus(); runSearch(''); },50);
}

function closeSearch(){
  const m=document.getElementById('search-modal');
  if(m) m.remove();
}

function runSearch(q){
  const el=document.getElementById('search-results'); if(!el) return;
  q=q.toLowerCase().trim();
  const results=[];

  // Search tenants
  STATE.tenants.filter(t=>t.industry!=='Vacant').forEach(t=>{
    const score=[t.name,t.floors,t.status,t.industry,t.expiry].join(' ').toLowerCase();
    if(!q||score.includes(q)){
      results.push({
        type:'tenant', icon:'🏢', title:t.name,
        sub:`Floor ${t.floors} · ${t.m2.toLocaleString()}m² · $${t.rent}/m² · ${t.status}`,
        action:()=>{closeSearch();goto('tenants');setTimeout(()=>expandTenant(t.id),250);}
      });
    }
  });

  // Search contracts
  STATE.contracts.forEach(c=>{
    const score=[c.id,c.party,c.category,c.status,c.keyTerms||''].join(' ').toLowerCase();
    if(q&&score.includes(q)){
      results.push({
        type:'contract', icon:'📄', title:c.party,
        sub:`${c.id} · ${c.category} · $${(c.monthlyValue||0).toLocaleString()}/mo · ${c.status}`,
        action:()=>{closeSearch();goto('contracts');}
      });
    }
  });

  // Search tickets
  STATE.tickets.forEach(t=>{
    const score=[t.title,t.description,t.floor,t.status,t.priority].join(' ').toLowerCase();
    if(q&&score.includes(q)){
      results.push({
        type:'ticket', icon:'🔧', title:t.title,
        sub:`Floor ${t.floor} · ${t.priority} priority · ${t.status}`,
        action:()=>{closeSearch();goto('operations');}
      });
    }
  });

  // Search invoices by amount or tenant
  STATE.invoices.forEach(inv=>{
    const score=[inv.id,inv.tenant,String(inv.amount),inv.status].join(' ').toLowerCase();
    if(q&&score.includes(q)){
      results.push({
        type:'invoice', icon:'💰', title:inv.tenant,
        sub:`${inv.id} · $${inv.amount.toLocaleString()} · ${inv.status} · due ${inv.due}`,
        action:()=>{closeSearch();goto('accounting');}
      });
    }
  });

  // Quick nav shortcuts
  if(!q){
    [['Overview','overview','📊'],['Floor Map','floormap','🗺️'],['Financial','financial','📈'],
     ['Tenants','tenants','🏢'],['Contracts','contracts','📄'],['Accounting','accounting','💼'],
     ['Operations','operations','🔧'],['Leasing CRM','leasing_crm','🎯']].forEach(([lbl,tab,icon])=>{
      results.push({type:'nav',icon,title:lbl,sub:'Navigate to '+lbl,
        action:()=>{closeSearch();goto(tab);}});
    });
  }

  // Render
  const typeColor={tenant:'var(--indigo)',contract:'var(--gold)',ticket:'var(--warn)',invoice:'var(--ok)',nav:'var(--txt3)'};
  if(results.length===0){
    el.innerHTML='<div style="padding:24px;text-align:center;color:var(--txt3);font-size:13px">No results for "'+q+'"</div>';
    return;
  }
  el.innerHTML=results.slice(0,12).map((r,i)=>`
    <div onclick="r${i}_action()" id="sr-${i}" style="display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:7px;cursor:pointer;margin:2px 6px"
      onmouseenter="this.style.background='var(--lift)'" onmouseleave="this.style.background=''" >
      <span style="font-size:18px;width:24px;text-align:center">${r.icon}</span>
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;color:var(--txt);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${r.title}</div>
        <div style="font-size:11px;color:var(--txt3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${r.sub}</div>
      </div>
      <span style="font-size:10px;padding:2px 7px;border-radius:4px;background:${typeColor[r.type]}22;color:${typeColor[r.type]}">${r.type}</span>
    </div>`).join('');
  // Attach actions
  results.slice(0,12).forEach((r,i)=>{
    window['r'+i+'_action']=r.action;
  });
}


function exportRentRoll(){
  const now=new Date().toISOString().slice(0,10);
  const headers=['Tenant','Floor','m²','Rent $/m²','Svc Fee $/m²','Monthly Rent','Monthly Svc','Total Billing',
                 'Status','Start','Expiry','Industry','Escalation','WALE (yrs)'];
  const today=new Date('2026-03-15');
  const rows=STATE.tenants
    .filter(t=>t.status!=='terminated'&&t.industry!=='Vacant')
    .map(t=>{
      const tr=STATE.tenantRevenue.find(r=>r.id===t.id)||{};
      const ctr=STATE.contracts.find(c=>c.type==='tenant'&&(c.party===t.name||t.name.includes((c.party||'').split(' ')[0])));
      const exp=t.expiry?new Date(t.expiry+'-01'):null;
      const wale=exp?Math.max(0,(exp-today)/(86400000*365)).toFixed(2):'—';
      return [
        t.name, t.floors, t.m2, t.rent, t.svcPerM2||'',
        Math.round(t.rent*t.m2), Math.round((t.svcPerM2||0)*t.m2),
        Math.round((t.rent+(t.svcPerM2||0))*t.m2),
        t.status, t.start, t.expiry, t.industry,
        ctr?.escalation||'', wale
      ];
    });
  const csv=[headers,...rows].map(r=>r.map(v=>`"${v}"`).join(',')).join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download='RentRoll_'+BUILDING_CONFIG.name.replace(/ /g,'_')+'_'+now+'.csv';
  a.click();
  addAudit('Rent roll exported',rows.length+' tenants · '+now);
  showToast('✓ Rent roll exported ('+rows.length+' tenants)','ok');
}

function showShortcuts(){
  if(document.getElementById('shortcuts-modal')) {document.getElementById('shortcuts-modal').remove();return;}
  const m=document.createElement('div');
  m.id='shortcuts-modal';
  m.style.cssText='position:fixed;bottom:70px;right:20px;z-index:8888;background:var(--card);border:0.5px solid var(--b1);border-radius:10px;padding:16px 20px;min-width:280px;box-shadow:0 12px 40px rgba(0,0,0,.4)';
  m.innerHTML=`<div style="font-size:11px;color:var(--gold);letter-spacing:.8px;text-transform:uppercase;margin-bottom:10px">Keyboard Shortcuts</div>
    ${[['Ctrl K','Global Search'],['Ctrl P','Print / PDF'],['Ctrl E','Export Rent Roll'],['Ctrl 1-9','Switch tabs'],['Escape','Close modals'],['?','Show shortcuts']].map(([k,v])=>`
    <div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:12px">
      <span style="color:var(--txt2)">${v}</span>
      <kbd style="background:var(--lift);border:0.5px solid var(--b2);border-radius:4px;padding:2px 7px;font-size:10px;color:var(--txt);font-family:monospace">${k}</kbd>
    </div>`).join('')}`;
  document.body.appendChild(m);
  setTimeout(()=>document.addEventListener('click',()=>m.remove(),{once:true}),100);
}
document.addEventListener('keydown',e=>{
  if(e.key==='?'&&!e.ctrlKey) showShortcuts();
  if((e.ctrlKey||e.metaKey)&&e.key==='p'){e.preventDefault();exportPDF();}
  if((e.ctrlKey||e.metaKey)&&e.key==='e'){e.preventDefault();exportRentRoll();}
  // Ctrl+1-9 for tabs
  if((e.ctrlKey||e.metaKey)&&e.key>='1'&&e.key<='9'){
    e.preventDefault();
    const tabs=getEffectiveTabs(CU)||[];
    const idx=parseInt(e.key)-1;
    if(tabs[idx]) goto(tabs[idx]);
  }
});
