<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Leadvisors Tower — Internal Control System</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>:root{
  --ink:#0D1117;--surf:#131A24;--card:#192231;--card2:#1E2A3A;--lift:#243347;
  --gold:#C8A84B;--gold2:#E4C96A;--jade:#2A7A5E;--jade2:#3AA87E;
  --indigo:#3B72C8;--amber:#D4820E;--rose:#C45A7A;
  --txt:#D8E6F0;--txt2:#7A9BB8;--txt3:#4A6A84;
  --b1:rgba(120,160,190,0.10);--b2:rgba(120,160,190,0.20);
  --ok:#2ECC9A;--warn:#E8A020;--bad:#E24B4A;
}
body{font-family:'DM Sans',sans-serif;background:var(--ink);color:var(--txt);min-height:100vh}

/* \u2550\u2550\u2550 LOGIN \u2550\u2550\u2550 */
#login{position:fixed;inset:0;background:var(--ink);display:flex;align-items:center;justify-content:center;z-index:999;transition:opacity .35s}
#login.gone{opacity:0;pointer-events:none}
.lbox{width:400px;background:var(--surf);border:0.5px solid var(--b2);border-radius:14px;padding:38px 34px}
.llogo{text-align:center;margin-bottom:26px}
.lmark{width:54px;height:54px;background:var(--gold);border-radius:9px;display:inline-flex;align-items:center;justify-content:center;font-family:'Noto Serif JP',serif;font-size:22px;color:#0D1117;margin-bottom:10px}
.ltitle{font-family:'Noto Serif JP',serif;font-size:19px;color:var(--gold);font-weight:300;letter-spacing:.5px}
.lsub{font-size:10px;color:var(--txt3);letter-spacing:1.8px;text-transform:uppercase;margin-top:5px}
.llabel{font-size:10px;color:var(--txt3);letter-spacing:.8px;margin-bottom:5px;margin-top:14px;display:block}
.linput{width:100%;background:var(--card2);border:0.5px solid var(--b2);border-radius:7px;padding:10px 14px;color:var(--txt);font-size:13px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s}
.linput:focus{border-color:rgba(200,168,75,.5)}
.lbtn{width:100%;margin-top:20px;padding:11px;background:var(--gold);border:none;border-radius:7px;color:#0D1117;font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;letter-spacing:.3px}
.lbtn:hover{opacity:.88}
.lerr{color:var(--bad);font-size:12px;margin-top:9px;text-align:center;min-height:16px}
.lhint-wrap{margin-top:18px;padding-top:16px;border-top:0.5px solid var(--b1)}
.lhint{font-size:9px;color:var(--txt3);letter-spacing:.8px;text-transform:uppercase;margin-bottom:8px}
.rpill{display:inline-flex;align-items:center;gap:5px;padding:4px 9px;border-radius:20px;font-size:10px;margin:2px;cursor:pointer;border:0.5px solid;transition:opacity .15s;user-select:none}
.rpill:hover{opacity:.75}

/* \u2550\u2550\u2550 SHELL \u2550\u2550\u2550 */
#app{display:none}
#app.show{display:block}
nav{display:flex;align-items:center;justify-content:space-between;padding:10px 22px;background:var(--surf);border-bottom:0.5px solid var(--b1);position:sticky;top:0;z-index:50}
.bmark{width:30px;height:30px;background:var(--gold);border-radius:5px;display:flex;align-items:center;justify-content:center;font-family:'Noto Serif JP',serif;font-size:12px;color:#0D1117}
.bname{font-family:'Noto Serif JP',serif;font-size:14px;color:var(--gold);font-weight:300}
.bsub{font-size:9px;color:var(--txt3);letter-spacing:1.6px;text-transform:uppercase;margin-top:1px}
#ntabs{display:flex;gap:1px;background:var(--ink);border-radius:6px;padding:3px;border:0.5px solid var(--b1);flex-wrap:wrap}
.ntab{padding:5px 12px;border-radius:4px;font-size:11px;font-weight:500;cursor:pointer;color:var(--txt2);border:none;background:none;letter-spacing:.3px;transition:all .15s;white-space:nowrap;font-family:'DM Sans',sans-serif}
.ntab.on{background:var(--card2);color:var(--gold);border:0.5px solid var(--b2)}
.ntab:hover:not(.on){color:var(--txt)}
.rbadge{padding:3px 10px;border-radius:12px;font-size:10px;font-weight:500;letter-spacing:.3px}
.uavatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500}
.lout{font-size:11px;cursor:pointer;padding:4px 9px;border-radius:5px;border:0.5px solid var(--b1);background:none;color:var(--txt2);font-family:'DM Sans',sans-serif}
.lout:hover{border-color:var(--b2);color:var(--txt)}

/* \u2550\u2550\u2550 PAGES \u2550\u2550\u2550 */
.pg{padding:20px 22px;animation:fadeUp .25s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.ptitle{font-family:'Noto Serif JP',serif;font-size:19px;color:var(--txt);font-weight:300;letter-spacing:.3px;margin-bottom:3px}
.psub{font-size:11px;color:var(--txt3);margin-bottom:18px}

/* \u2550\u2550\u2550 LAYOUT \u2550\u2550\u2550 */
.krow{display:grid;gap:10px;margin-bottom:16px}
.k6{grid-template-columns:repeat(6,1fr)}.k5{grid-template-columns:repeat(5,1fr)}.k4{grid-template-columns:repeat(4,1fr)}.k3{grid-template-columns:repeat(3,1fr)}
.kpi{background:var(--card);border:0.5px solid var(--b1);border-radius:8px;padding:13px 15px;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:8px 8px 0 0}
.k-gold::before{background:var(--gold)}.k-jade::before{background:var(--jade2)}.k-blue::before{background:var(--indigo)}.k-warn::before{background:var(--amber)}.k-bad::before{background:var(--bad)}.k-rose::before{background:var(--rose)}
.kl{font-size:9px;letter-spacing:1.3px;text-transform:uppercase;color:var(--txt3);margin-bottom:6px}
.kv{font-size:22px;font-weight:300;color:var(--txt);line-height:1}
.kv em{font-size:11px;color:var(--txt3);font-style:normal}
.kd{font-size:10px;margin-top:4px}.up{color:var(--ok)}.dn{color:var(--bad)}.fl{color:var(--txt3)}
.g2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:13px;margin-bottom:13px}
.g3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:13px;margin-bottom:13px}
.g4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:13px;margin-bottom:13px}
.s2{grid-column:span 2}.s3{grid-column:span 3}
.card{background:var(--card);border:0.5px solid var(--b1);border-radius:9px;padding:15px 17px}
.ct{font-size:9px;letter-spacing:1.2px;text-transform:uppercase;color:var(--txt3);margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.ctr{font-size:10px;color:var(--txt3);letter-spacing:.3px;cursor:pointer;text-transform:none}

/* \u2550\u2550\u2550 ELEMENTS \u2550\u2550\u2550 */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:12px;font-size:10px;font-weight:500}
.bok{background:rgba(46,204,154,.14);color:#2ECC9A}.bwarn{background:rgba(232,160,32,.14);color:#E8A020}
.bbad{background:rgba(226,75,74,.14);color:#E24B4A}.bblue{background:rgba(59,114,200,.14);color:#6EA8FF}
.bgold{background:rgba(200,168,75,.14);color:#C8A84B}.brose{background:rgba(196,90,122,.14);color:#E8819A}
table{width:100%;border-collapse:collapse}
th{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--txt3);font-weight:500;text-align:left;padding:6px 8px;border-bottom:0.5px solid var(--b1)}
td{font-size:12px;color:var(--txt2);padding:7px 8px;border-bottom:0.5px solid var(--b1)}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.02)}
.tdm{color:var(--txt);font-weight:500}
.pr{margin-bottom:9px}.ph{display:flex;justify-content:space-between;margin-bottom:4px}
.pl{font-size:11px;color:var(--txt2)}.pv{font-size:11px;color:var(--txt);font-weight:500}
.pb{height:4px;background:var(--lift);border-radius:2px}.pf{height:100%;border-radius:2px}
.sr{display:flex;justify-content:space-between;padding:6px 0;border-bottom:0.5px solid var(--b1)}.sr:last-child{border-bottom:none}
.sl{font-size:12px;color:var(--txt2)}.sv{font-size:12px;color:var(--txt);font-weight:500}
.al{display:flex;gap:9px;padding:8px 11px;border-radius:6px;margin-bottom:6px;border:0.5px solid}
.alh{background:rgba(226,75,74,.07);border-color:rgba(226,75,74,.2)}.alm{background:rgba(232,160,32,.07);border-color:rgba(232,160,32,.2)}.all{background:rgba(59,114,200,.07);border-color:rgba(59,114,200,.2)}
.aldot{width:6px;height:6px;border-radius:50%;margin-top:4px;flex-shrink:0}
.alt{font-size:12px;color:var(--txt);font-weight:500;margin-bottom:1px}.als{font-size:10px;color:var(--txt3)}
.tl{display:flex;gap:10px;padding:7px 0;border-bottom:0.5px solid var(--b1)}.tl:last-child{border-bottom:none}
.tldot{width:6px;height:6px;border-radius:50%;margin-top:5px;flex-shrink:0}
.tlti{font-size:12px;color:var(--txt);font-weight:500;margin-bottom:1px}.tlm{font-size:10px;color:var(--txt3)}
.cw{position:relative;width:100%}

/* \u2550\u2550\u2550 FORM ELEMENTS \u2550\u2550\u2550 */
.frow{display:grid;gap:10px;margin-bottom:10px}
.fc3{grid-template-columns:repeat(3,1fr)}.fc2{grid-template-columns:repeat(2,1fr)}.fc4{grid-template-columns:repeat(4,1fr)}
.fg{display:flex;flex-direction:column;gap:4px}
.flbl{font-size:10px;color:var(--txt3);letter-spacing:.5px}
.finp{background:var(--lift);border:0.5px solid var(--b2);border-radius:5px;padding:7px 10px;color:var(--txt);font-size:12px;font-family:'DM Sans',sans-serif;outline:none;width:100%}
.finp:focus{border-color:rgba(200,168,75,.4)}
.finp:disabled{opacity:.35;cursor:not-allowed}
select.finp option{background:var(--card2);color:var(--txt)}
.fbar{display:flex;gap:8px;margin-top:12px;padding-top:12px;border-top:0.5px solid var(--b1)}
.fbtn{padding:7px 16px;border-radius:5px;font-size:11px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;border:0.5px solid;transition:opacity .15s}
.fbtn:hover{opacity:.82}
.fpri{background:var(--gold);border-color:var(--gold);color:#0D1117}
.fsec{background:none;border-color:var(--b2);color:var(--txt2)}
.fdng{background:rgba(226,75,74,.15);border-color:rgba(226,75,74,.3);color:var(--bad)}
.fwrap{background:var(--card2);border:0.5px solid var(--b2);border-radius:8px;padding:14px 16px;margin-bottom:12px}
.fsaved{color:var(--ok);font-size:11px;margin-left:8px;opacity:0;transition:opacity .3s}
.fsaved.show{opacity:1}

/* \u2550\u2550\u2550 FLOOR MAP \u2550\u2550\u2550 */
.fgrid{display:grid;grid-template-columns:repeat(6,1fr);gap:5px}
.fl{border-radius:5px;padding:7px 5px;text-align:center;cursor:pointer;transition:all .15s;border:0.5px solid}
.fl:hover{transform:translateY(-1px)}
.fl.occ{background:rgba(59,114,200,.12);border-color:rgba(59,114,200,.28)}
.fl.part{background:rgba(232,160,32,.1);border-color:rgba(232,160,32,.25)}
.fl.vac{background:rgba(46,204,154,.08);border-color:rgba(46,204,154,.22)}
.fl.zen{background:rgba(200,168,75,.1);border-color:rgba(200,168,75,.28)}
.fl.svc{background:rgba(196,90,122,.1);border-color:rgba(196,90,122,.25)}
.fl.bsm{background:rgba(74,106,132,.1);border-color:rgba(74,106,132,.25)}
.fln{font-size:9px;color:var(--txt3);margin-bottom:2px}
.flt{font-size:10px;font-weight:500;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.flm{font-size:9px;color:var(--txt2)}

/* \u2550\u2550\u2550 MESSAGES \u2550\u2550\u2550 */
.msgwrap{height:210px;overflow-y:auto;padding:4px 0;margin-bottom:8px}
.msg{display:flex;gap:7px;margin-bottom:8px}.msg.out{flex-direction:row-reverse}
.mav{width:24px;height:24px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:500}
.mav.sys{background:var(--jade);color:#fff}.mav.me{background:var(--gold);color:#0D1117}
.mbub{max-width:75%;padding:7px 11px;border-radius:7px;font-size:11px;line-height:1.5}
.msg.in .mbub{background:var(--card2);color:var(--txt);border-radius:2px 7px 7px 7px}
.msg.out .mbub{background:rgba(200,168,75,.18);color:var(--txt);border-radius:7px 2px 7px 7px}
.mtime{font-size:9px;color:var(--txt3);margin-top:2px}
.minp{flex:1;background:var(--card2);border:0.5px solid var(--b2);border-radius:5px;padding:7px 11px;color:var(--txt);font-size:12px;font-family:'DM Sans',sans-serif;outline:none}
.minp:focus{border-color:rgba(200,168,75,.4)}
.msend{background:var(--gold);border:none;border-radius:5px;padding:7px 12px;color:#0D1117;font-size:11px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif}

/* \u2550\u2550\u2550 DOCS \u2550\u2550\u2550 */
.docitem{display:flex;align-items:center;gap:9px;padding:7px 10px;background:var(--card2);border-radius:5px;margin-bottom:5px;border:0.5px solid var(--b1)}
.dicon{width:26px;height:26px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}
.dpdf{background:rgba(226,75,74,.2)}.dxls{background:rgba(46,204,154,.2)}.ddoc{background:rgba(59,114,200,.2)}
.dname{font-size:11px;color:var(--txt);font-weight:500}.dmeta{font-size:10px;color:var(--txt3);margin-top:1px}

/* \u2550\u2550\u2550 AUDIT \u2550\u2550\u2550 */
.auitem{display:flex;gap:11px;padding:9px 0;border-bottom:0.5px solid var(--b1);align-items:flex-start}
.auitem:last-child{border-bottom:none}
.auav{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;flex-shrink:0}
.auaction{font-size:12px;color:var(--txt);font-weight:500;margin-bottom:2px}
.aumeta{font-size:10px;color:var(--txt3)}.auchange{font-size:11px;color:var(--txt2);margin-top:3px;font-style:italic}

/* \u2550\u2550\u2550 ACCESS DENIED \u2550\u2550\u2550 */
.denied{text-align:center;padding:70px 20px}
.denied-icon{font-size:38px;margin-bottom:14px;opacity:.4}
.denied-title{font-size:15px;font-weight:500;color:var(--txt);margin-bottom:6px}
.denied-sub{font-size:12px;color:var(--txt3)}

/* \u2550\u2550\u2550 ADMIN \u2550\u2550\u2550 */
.user-row{display:flex;align-items:center;gap:12px;padding:9px 12px;background:var(--card2);border-radius:7px;margin-bottom:7px;border:0.5px solid var(--b1)}
.u-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;flex-shrink:0}
.u-name{font-size:13px;font-weight:500;color:var(--txt)}.u-role{font-size:10px;color:var(--txt3);margin-top:1px}
.u-actions{margin-left:auto;display:flex;gap:6px}
.u-btn{padding:4px 10px;border-radius:4px;font-size:10px;cursor:pointer;border:0.5px solid;font-family:'DM Sans',sans-serif}
.u-edit{background:none;border-color:var(--b2);color:var(--txt2)}.u-edit:hover{color:var(--gold);border-color:rgba(200,168,75,.4)}
.u-del{background:none;border-color:rgba(226,75,74,.2);color:var(--bad)}.u-del:hover{background:rgba(226,75,74,.08)}

/* ═══ LOGIN ═══ */
#login{position:fixed;inset:0;display:flex;align-items:flex-end;justify-content:center;padding-bottom:60px;z-index:999;transition:opacity .35s}
#login::before{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(5,8,15,.85)0%,rgba(10,18,30,.4)60%,rgba(5,8,12,.25)100%);z-index:0}
#login.gone{opacity:0;pointer-events:none}
.lbox{position:relative;z-index:1;width:440px;background:rgba(10,16,26,.82);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:0.5px solid rgba(200,168,75,.22);border-radius:14px;padding:28px 32px;box-shadow:0 8px 40px rgba(0,0,0,.6),inset 0 0.5px 0 rgba(255,255,255,.05)}
.llogo{display:none}
.lsub{font-size:10px;color:rgba(200,168,75,.7);letter-spacing:2.5px;text-transform:uppercase;text-align:center;margin-bottom:18px}
.llabel{display:block;font-size:11px;color:var(--txt3);margin-bottom:5px;letter-spacing:.3px}
.linp{width:100%;background:rgba(255,255,255,.06);border:0.5px solid rgba(200,168,75,.25);border-radius:7px;padding:9px 12px;font-size:13px;color:var(--txt);font-family:'DM Sans',sans-serif;outline:none;transition:border-color .15s;margin-bottom:12px}
.linp:focus{border-color:rgba(200,168,75,.6);background:rgba(255,255,255,.08)}
.lbtn{width:100%;padding:11px;background:var(--gold);color:#0D1117;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;letter-spacing:.5px;margin-top:4px;font-family:'DM Sans',sans-serif;transition:background .15s}
.lbtn:hover{background:var(--gold2)}
.lerr{color:var(--bad);font-size:11px;min-height:16px;text-align:center;margin-top:6px}
.lhint-wrap{margin-top:14px;padding-top:12px;border-top:0.5px solid rgba(120,160,190,.12)}
.lhint{font-size:10px;color:var(--txt3);letter-spacing:.5px;margin-bottom:8px;text-align:center}
@media(max-width:768px){nav{flex-wrap:wrap;gap:8px;padding:8px 12px}#ntabs{order:3;width:100%;overflow-x:auto;padding:2px}.ntab{padding:5px 10px;font-size:10px}.pg{padding:12px}.krow.k5,.krow.k4,.krow.k3{grid-template-columns:repeat(2,1fr)}.g2,.g3,.g4{grid-template-columns:1fr}.s2,.s3{grid-column:span 1}.frow.fc4,.frow.fc3{grid-template-columns:1fr 1fr}.frow.fc2{grid-template-columns:1fr}table{font-size:11px}th,td{padding:5px 6px}.bname{font-size:12px}.bsub{display:none}.lbox{width:94vw;padding:22px 20px}}

//  LOCALSTORAGE PERSISTENCE

const LS_KEY = 'leadvisors_ics_v1';

function saveData(){
  // Show brief save indicator
  const ind=document.getElementById('save-ind');
  if(ind){ind.style.opacity='1';clearTimeout(ind._t);ind._t=setTimeout(()=>ind.style.opacity='0',1200);}
  try{
    const payload={
      STATE: STATE,
      AUDIT: AUDIT,
      BUILDING_CONFIG: BUILDING_CONFIG,
      savedAt: new Date().toISOString()
    };
    localStorage.setItem(LS_KEY, JSON.stringify(payload));
  }catch(e){ console.warn('Save failed:',e); }
}

function loadData(){
  try{
    const raw=localStorage.getItem(LS_KEY);
    if(!raw) return false;
    const payload=JSON.parse(raw);
    if(payload.STATE){
      // Merge each key so new default keys still appear
      Object.keys(payload.STATE).forEach(k=>{ if(STATE[k]!==undefined) STATE[k]=payload.STATE[k]; });
    }
    if(payload.AUDIT && Array.isArray(payload.AUDIT)) AUDIT=payload.AUDIT;
    if(payload.BUILDING_CONFIG) Object.assign(BUILDING_CONFIG, payload.BUILDING_CONFIG);
    console.log('✓ Data loaded from localStorage ('+(raw.length/1024).toFixed(1)+'KB), saved '+payload.savedAt);
    return true;
  }catch(e){ console.warn('Load failed:',e); return false; }
}

function resetData(){
  if(!confirm('Reset ALL data to factory defaults? This cannot be undone.')) return;
  localStorage.removeItem(LS_KEY);
  showToast('Data reset — reloading...','warn');
  setTimeout(()=>location.reload(),1000);
}

// Auto-load on page start
(function(){ loadData(); })();

function buildPills(){
  const c=document.getElementById('rpills'); c.innerHTML='';
  ACCOUNTS.forEach(a=>{
    const r=ROLES[a.role];
    const p=document.createElement('span');
    p.className='rpill';
    p.style.cssText=`border-color:${r.color}35;color:${r.color};background:${r.bg}`;
    p.innerHTML=`<b>${a.u}</b> <span style="opacity:.6">${r.label}</span>`;
    p.onclick=()=>{document.getElementById('lu').value=a.u;document.getElementById('lp').value=a.p;};

  });
}
buildPills();

function login(){
  const u=document.getElementById('lu').value.trim();
  const p=document.getElementById('lp').value;
  const acc=ACCOUNTS.find(a=>a.u===u&&a.p===p);
  if(!acc){document.getElementById('lerr').textContent='Incorrect username or password.';return;}
  document.getElementById('lerr').textContent='';
  CU={...acc,role_obj:ROLES[acc.role]};
  document.getElementById('login').classList.add('gone');
  setTimeout(()=>document.getElementById('login').style.display='none',380);
  document.getElementById('app').classList.add('show');
  const _fab=document.getElementById('fab-shortcuts');if(_fab)_fab.style.display='flex';
  buildShell();
  addAudit('Signed in','Session started '+new Date().toLocaleString('en-GB'));
}

function logout(){
  addAudit('Signed out','Session ended');
  CU=null; charts={};
  document.getElementById('app').classList.remove('show');
  document.getElementById('login').style.display='flex';
  setTimeout(()=>document.getElementById('login').classList.remove('gone'),10);
  document.getElementById('lu').value='';document.getElementById('lp').value='';
}

function buildShell(){
  const r=CU.role_obj;
  const effectiveTabs=getEffectiveTabs(CU);
  const nb=document.getElementById('ntabs'); nb.innerHTML='';
  effectiveTabs.forEach(tid=>{
    const b=document.createElement('button');
    b.className='ntab';b.textContent=TAB_NAMES[tid];b.dataset.tab=tid;
    b.onclick=()=>goto(tid);
    nb.appendChild(b);
  });
  document.getElementById('rbadge').innerHTML=`<span class="rbadge" style="background:${r.bg};color:${r.color}">${r.label}</span>`;
  document.getElementById('uavatar').style.cssText=`background:${r.color};color:#0D1117`;
  document.getElementById('uavatar').textContent=CU.init;
  document.getElementById('uname').textContent=CU.name;
  goto(effectiveTabs[0]);
}

function goto(tid){
  saveData();
  document.querySelectorAll('.ntab').forEach(b=>b.classList.toggle('on',b.dataset.tab===tid));
  const pc=document.getElementById('pages');
  pc.innerHTML='';
  const pg=document.createElement('div');pg.className='pg';pc.appendChild(pg);
  render(tid,pg);
  if(tid==='overview') setTimeout(updateRefreshTime,200);
  setTimeout(()=>{initCharts(tid);updateNavBell();},130);
}

// CANONICAL OCCUPANCY — single source of truth used by ALL pages
// NLA = BUILDING_CONFIG.floor_areas sum (user-editable in Building Config)
// Occupied = active tenant m² per floor, capped to floor NLA
// ═══════════════════════════════════════════════════════════════════
function getOccupancyStats(){
  const FA=BUILDING_CONFIG.floor_areas;
  // Total NLA from building config (authoritative)
  const nla=Object.values(FA).reduce((s,v)=>s+v,0);

  // Per-floor occupancy from STATE.tenants
  const floorOcc={};
  STATE.tenants.filter(t=>t.status!=='terminated'&&t.industry!=='Vacant').forEach(t=>{
    const fs=t.floors.toString().trim();
    const rng=fs.match(/^(\d+)-(\d+)$/);
    const fids=rng
      ? Array.from({length:parseInt(rng[2])-parseInt(rng[1])+1},
          (_,i)=>(parseInt(rng[1])+i)+'F')
      : [/^\d+$/.test(fs)?fs+'F':fs];
    const perFloor=Math.round(t.m2/fids.length);
    fids.forEach(fid=>{floorOcc[fid]=(floorOcc[fid]||0)+perFloor;});
  });

  // Occupied = sum capped to floor capacity (can't exceed NLA per floor)
  let occupied=0;
  Object.entries(FA).forEach(([fid,cap])=>{
    occupied+=Math.min(cap, floorOcc[fid]||0);
  });

  const vacant=Math.max(0,nla-occupied);
  const pct=nla>0?Math.round(occupied/nla*1000)/10:0;
  return {nla,occupied,vacant,pct,floorOcc,FA};
}

const STATIC_FLOORS={
  'B3':{t:'Parking B3',   m:'Smart parking',c:'bsm'},
  'B2':{t:'Parking B2',   m:'Smart parking',c:'bsm'},
  'B1':{t:'Parking B1',   m:'Smart parking',c:'bsm'},

  '10F':{t:'Zen Garden/F&B',m:'Sky dining',  c:'zen'},
  '25F':{t:'Leadvisors Mgmt',m:'Owner use',  c:'zen'},
};
const ALL_FLOOR_IDS=['B3','B2','B1','L1','2F','3F','4F','5F','6F','7F','8F','9F','10F',
  '11F','12F','13F','14F','15F','16F','17F','18F','19F','20F','21F','22F','23F','24F','25F'];

function getFloorData(){
  const map={};
  // Static floors never overridden by tenants
  Object.entries(STATIC_FLOORS).forEach(([k,v])=>{ map[k]={...v, tenants:[]}; });

  // Map each tenant to its floor(s), supporting multiple tenants per floor
  STATE.tenants.forEach(t=>{
    const fs=t.floors.toString().trim();
    const rng=fs.match(new RegExp('^(\\d+)-(\\d+)$'));
    const flids=rng
      ? Array.from({length:parseInt(rng[2])-parseInt(rng[1])+1},(_,i)=>(parseInt(rng[1])+i)+'F')
      : [new RegExp('^\\d+$').test(fs)?fs+'F':fs];

    flids.forEach(fid=>{
      if(STATIC_FLOORS[fid]) return;
      if(!map[fid]) map[fid]={tenants:[]};
      // Determine colour — worst status wins
      const priority={terminated:0,atrisk:1,renewing:2,partial:3,active:4};
      const statusColor={terminated:'vac',atrisk:'part',renewing:'part',partial:'part',active:'occ'};
      if(t.industry==='Co-working'&&t.status!=='terminated') map[fid].cOverride='svc';
      const area=Math.round(t.m2/flids.length);
      map[fid].tenants.push({
        id:t.id, name:t.name, m2:area, status:t.status, rent:t.rent,
        expiry:t.expiry, industry:t.industry,
      });
    });
  });

  // Compute display values for each floor from its tenants
  ALL_FLOOR_IDS.forEach(fid=>{
    if(!map[fid]){ map[fid]={t:'Vacant',m:'Available',c:'vac',tenants:[]}; return; }
    if(STATIC_FLOORS[fid]){ map[fid].tenants=map[fid].tenants||[]; return; }
    const ts=map[fid].tenants||[];
    if(ts.length===0){ map[fid]={t:'Vacant',m:'Available',c:'vac',tenants:[]}; return; }

    // All terminated → fully vacant
    const active=ts.filter(t=>t.status!=='terminated'&&t.industry!=='Vacant');
    // Floor capacity from BUILDING_CONFIG, fallback to sum of all tenant slots
    const floorCap=BUILDING_CONFIG.floor_areas[fid]||ts.reduce((s,t)=>s+t.m2,0);
    if(active.length===0){
      map[fid]={t:'Vacant',m:floorCap.toLocaleString()+' m² (available)',c:'vac',tenants:ts}; return;
    }

    const statusPriority={atrisk:0,renewing:1,partial:2,active:3};
    const worst=active.reduce((w,t)=>(statusPriority[t.status]||3)<(statusPriority[w.status]||3)?t:w, active[0]);
    const c=map[fid].cOverride||(worst.status==='active'?'occ':worst.status==='atrisk'||worst.status==='renewing'?'part':'part');
    // Occupied m² = only active/non-vacant tenants
    const totalM2=active.reduce((s,t)=>s+t.m2,0);
    // Vacant = floor capacity minus what's occupied (not terminated m² which may be wrong)
    const vacantM2=Math.max(0,floorCap-totalM2);

    if(active.length===1&&vacantM2===0){
      // Full floor, single tenant
      map[fid]={
        t:active[0].name, m:totalM2.toLocaleString()+' m²'+(worst.status==='atrisk'?' ⚠':''),
        c, tenants:ts, tid:active[0].id
      };
    } else if(active.length===1&&vacantM2>0){
      // Partial floor — show tenant + remaining vacant space
      map[fid]={
        t:active[0].name,
        m:totalM2.toLocaleString()+' m² (+'+vacantM2.toLocaleString()+'m² available)',
        c:'part', tenants:ts, tid:active[0].id
      };
    } else {
      // Multiple active tenants on same floor
      const names=active.map(t=>t.name.split(' ')[0]).join(' + ');
      const vacantStr=vacantM2>0?' (+'+vacantM2.toLocaleString()+'m² avail)':'';
      map[fid]={
        t:names, m:totalM2.toLocaleString()+' m²'+vacantStr,
        c:'part', tenants:ts, multiTenant:true
      };
    }
  });
  return map;
}

function rTenantRows(){
  const canEdit=canEditTenants(), canRent=canEditRentFields(), showBtn=canEdit||canRent;
  const filterEl=document.getElementById('t-status-filter');
  const fval=filterEl?filterEl.value:'all';
  const searchEl=document.getElementById('tenant-search');
  const q=(searchEl?searchEl.value:'').toLowerCase().trim();
  let list=fval==='all'?STATE.tenants:STATE.tenants.filter(t=>t.status===fval);
  if(q){
    list=list.filter(t=>{
      const hay=[t.name,t.floors,t.status,t.industry,t.expiry||'',t.start||'',
                 String(t.rent),String(t.m2),String(t.svcPerM2||'')].join(' ').toLowerCase();
      return hay.includes(q);
    });
  }
  const countEl=document.getElementById('tenant-count');
  if(countEl) countEl.textContent=q||fval!=='all'?`${list.length} result${list.length!==1?'s':''}`:'';
  const tbody=document.getElementById('tenant-tbody'); if(!tbody) return;
  tbody.innerHTML=list.map(t=>{
    const mo=(t.m2*t.rent).toLocaleString();
    const hist=t.priceHistory||[];
    const last=hist[hist.length-1];
    const lastStr=last
      ?`<span style="font-size:10px;color:${last.type==='discount'?'var(--bad)':last.type==='freeze'?'var(--txt3)':'var(--ok)'};font-weight:500">${last.pct!=null?(last.pct>0?'+':'')+last.pct+'%':last.type} ${last.date}</span>`
      :'<span style="font-size:10px;color:var(--txt3)">—</span>';
    const isOpen=openTenantId===t.id;
    return `<tr id="tr-${t.id}" style="cursor:pointer;${isOpen?'background:rgba(200,168,75,.05)':''}" onclick="expandTenant(${t.id})">
      <td style="width:18px;text-align:center;color:var(--txt3);font-size:11px">${isOpen?'▼':'▶'}</td>
      <td class="tdm" style="white-space:nowrap">${t.name}</td>
      <td>${t.floors}</td><td>${t.m2.toLocaleString()}</td>
      <td style="font-weight:500;color:var(--gold)">$${t.rent}</td>
      <td>$${mo}</td><td>${t.start}</td><td>${t.expiry}</td>
      <td>${t.industry}</td><td>${statusBadge(t.status)}</td>
      <td>${lastStr}</td>
      ${showBtn?`<td onclick="event.stopPropagation()">
        <button class="fbtn fsec" style="padding:3px 8px;font-size:10px;white-space:nowrap" onclick="openEditTenant(${t.id})">${canRent&&!canEdit?'Rate/Contract':'Edit'}</button>
      </td>`:''}
    </tr>
    <tr id="td-${t.id}" style="display:none">
      <td colspan="${showBtn?12:11}" style="padding:0;background:var(--ink)">
        <div id="tdcontent-${t.id}"></div>
      </td>
    </tr>`;
  }).join('');
}

function filterTenants(q){
  if(!CU) return;
  rTenantRows(); // rTenantRows reads the search input itself
}

function expandTenant(id, forceOpen){
  const t=STATE.tenants.find(x=>x.id===id); if(!t) return;
  // collapse previous
  if(openTenantId && openTenantId!==id){
    const old=document.getElementById('td-'+openTenantId);
    const oldTr=document.getElementById('tr-'+openTenantId);
    if(old) old.style.display='none';
    if(oldTr){ oldTr.style.background=''; oldTr.querySelector('td').textContent='▶'; }
  }
  const row=document.getElementById('tr-'+id);
  const detail=document.getElementById('td-'+id);
  const arrow=row?row.querySelector('td'):null;
  if(!forceOpen && openTenantId===id){
    // close
    openTenantId=null;
    if(detail) detail.style.display='none';
    if(row) row.style.background='';
    if(arrow) arrow.textContent='▶';
    return;
  }
  openTenantId=id;
  if(row) row.style.background='rgba(200,168,75,.05)';
  if(arrow) arrow.textContent='▼';
  if(detail) detail.style.display='table-row';
  buildTenantDetail(id);
}

function buildTenantDetail(id){

  const el=document.getElementById('tdcontent-'+id); if(!el) return;
  const canEdit=canEditTenants(), canRent=canEditRentFields(), canContract=canEditContract();

  // Build LTM months Jan 2025 → Mar 2026
  const ltmMonths=[], ltmLabels=[];
  const d=new Date('2025-01-01');
  const MO=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  while(d<=new Date('2026-03-01')){
    const iso=d.toISOString().slice(0,7);

    const applicable=hist.filter(h=>h.date<=mon);
    return applicable.length>0 ? applicable[applicable.length-1].rent : t.rent;
  });

  // Mark change months

function saveTenantDetail(cuid,id){
  const t=STATE.tenants.find(x=>x.id===id); if(!t) return;
  const reason=(document.getElementById(cuid+'-reason')||{}).value.trim();
  if(!reason){alert('Reason / notes are required to log any change.');(document.getElementById(cuid+'-reason')||{}).focus();return;}

  const newRent=parseFloat((document.getElementById(cuid+'-rent')||{}).value)||t.rent;
  const newM2=parseInt((document.getElementById(cuid+'-m2')||{}).value)||t.m2;
  const chtype=(document.getElementById(cuid+'-type')||{}).value||'adjustment';
  const pct=parseFloat((document.getElementById(cuid+'-pct')||{}).value)||null;
  const effdate=(document.getElementById(cuid+'-effdate')||{}).value||new Date().toISOString().slice(0,7);
  const newStatus=(document.getElementById(cuid+'-status')||{}).value||t.status;
  const newExpiry=(document.getElementById(cuid+'-expiry')||{}).value||t.expiry;
  const newStart=(document.getElementById(cuid+'-start')||{}).value||t.start;

  const isTerminating=(chtype==='termination'||newStatus==='terminated');

  if(isTerminating && t.status!=='terminated'){
    const ok=confirm(`⚠ Terminate contract for "${t.name}"?\n\nThis will:\n• Set tenant status → Terminated\n• Set rent to $0\n• Mark floor(s) ${t.floors} as Vacant on the floor map\n• Update linked contract record to Terminated\n• Log this event in price history & audit trail\n\nProceed?`);
    if(!ok) return;
  }

  if(isTerminating){
    const prevRent=t.rent, prevStatus=t.status;
    const termDate=effdate||new Date().toISOString().slice(0,7);

    // 1. Tenant record
    t.status='terminated'; t.rent=0; t.svcPerM2=0;
    t.m2=newM2||t.m2;
    if(newExpiry) t.expiry=newExpiry;

    // 2. Price history
    t.priceHistory=t.priceHistory||[];
    t.priceHistory.push({date:termDate,m2:t.m2,rent:0,svcPerM2:0,
      reason:`TERMINATED — ${reason}`,type:'termination',pct:null,changedBy:CU.name});

    // 3. tenantRevenue → zeros (drives Financial & Accounting svc analysis)
    const tr=STATE.tenantRevenue.find(r=>r.id===id);
    if(tr){tr.rent=0;tr.svc_charge=0;tr.elec=0;tr.water=0;tr.parking_car=0;tr.parking_bike=0;tr.admin_fee=0;tr.other=0;tr.notes=`Terminated ${termDate}`;}

    // 4. Linked contracts → terminated
    const linked=STATE.contracts.filter(c=>c.type==='tenant'&&
      (c.party===t.name||t.name.toLowerCase().includes((c.party||'').split(' ')[0].toLowerCase())||
      (c.party||'').toLowerCase().includes(t.name.split(' ')[0].toLowerCase())));
    linked.forEach(c=>{c.status='terminated';c.rentPerM2=0;c.monthlyValue=0;c.svcChargePerM2=0;
      addAudit('Contract terminated',`${c.id} (${c.party}) auto-synced`);});

    // 5. Release parking bays
    STATE.parking.forEach(p=>{if(p.tenant===t.name){p.assigned=false;p.tenant='';p.plate='';p.monthly=0;}});

    // 6. Cancel pending invoices
    STATE.invoices.filter(i=>i.tenant===t.name&&i.status==='pending').forEach(i=>{i.status='overdue';});

    // 7. All pages re-render live from STATE on next navigation
    addAudit('⚠ LEASE TERMINATED',
      `${t.name} · Fl ${t.floors} · ${t.m2}m² · was $${prevRent}/m² · by ${CU.name} · "${reason.slice(0,80)}"`);
    showToast(`✓ ${t.name} terminated — all pages updated`,'bad');

  } else {
    // ── Normal update ──
    const newSvc = parseFloat((document.getElementById(cuid+'-svc')||{}).value);
    const svcPerM2 = isNaN(newSvc) ? (t.svcPerM2||6.5) : newSvc;
    const svcChanged = svcPerM2 !== (t.svcPerM2||0);
    const rentChanged = newRent !== t.rent;
    const m2Changed   = newM2   !== t.m2;

    if(rentChanged || m2Changed || svcChanged){
      t.priceHistory = t.priceHistory||[];
      // Build change description
      const changes=[];
      if(rentChanged) changes.push(`rent $${t.rent}→$${newRent}/m²`);
      if(svcChanged)  changes.push(`svc fee $${t.svcPerM2||'—'}→$${svcPerM2}/m²`);
      if(m2Changed)   changes.push(`area ${t.m2}→${newM2}m²`);
      t.priceHistory.push({
        date:effdate, m2:newM2, rent:newRent, svcPerM2,
        reason:`${reason} [${changes.join(', ')}]`,
        type:chtype, pct, changedBy:CU.name
      });
    }

    // ── Apply changes to tenant ──
    t.rent=newRent; t.m2=newM2; t.svcPerM2=svcPerM2;
    t.status=newStatus; t.expiry=newExpiry; t.start=newStart;

    // ── Propagate to tenantRevenue (drives Financial, Accounting svc analysis) ──
    const tr=STATE.tenantRevenue.find(r=>r.id===id);
    if(tr){
      tr.rent = Math.round(newRent*newM2);
      tr.svc_charge = Math.round(svcPerM2*newM2);
    }

    // ── Propagate back to linked contract ──
    const linked=STATE.contracts.filter(c=>
      c.type==='tenant' &&
      (c.party===t.name || t.name.toLowerCase().includes((c.party||'').split(' ')[0].toLowerCase()) ||
       (c.party||'').toLowerCase().includes(t.name.split(' ')[0].toLowerCase()))
    );
    linked.forEach(c=>{
      if(rentChanged){ c.rentPerM2=newRent; c.monthlyValue=Math.round(newRent*newM2); }
      if(svcChanged)  c.svcChargePerM2=svcPerM2;
      if(m2Changed)   c.m2=newM2;
      if(newStatus && newStatus!==t.status){
        const sm={active:'active',renewing:'active',atrisk:'atrisk',partial:'active',terminated:'terminated'};
        c.status=sm[newStatus]||newStatus;
      }
    });

    const auditDetail=`${t.name}: rent $${t.rent}/m² · svc $${t.svcPerM2}/m² · ${t.m2}m² · "${reason.slice(0,60)}"`;
    addAudit(`Tenant update — ${chtype}`, auditDetail);
    showToast(`✓ ${t.name} updated — changes propagated to Financial & Contracts`,'ok');
  }

  buildTenantDetail(id);
  rTenantRows();
}

function showToast(msg, type){
  let toast=document.getElementById('sys-toast');
  if(!toast){
    toast=document.createElement('div');
    toast.id='sys-toast';
    toast.style.cssText='position:fixed;bottom:24px;right:24px;z-index:9999;padding:11px 18px;border-radius:8px;font-size:13px;font-weight:500;font-family:DM Sans,sans-serif;transition:opacity .4s;pointer-events:none;max-width:340px';
    document.body.appendChild(toast);
  }
  const colors={ok:'background:#1E2A3A;border:0.5px solid #2ECC9A;color:#2ECC9A',bad:'background:#1E2A3A;border:0.5px solid #E24B4A;color:#E24B4A',warn:'background:#1E2A3A;border:0.5px solid #E8A020;color:#E8A020'};
  toast.style.cssText+=';'+colors[type]||colors.ok;
  toast.textContent=msg;
  toast.style.opacity='1';
  clearTimeout(toast._t);
  toast._t=setTimeout(()=>{toast.style.opacity='0';},3500);
}

let FIN_PERIOD = '12m';

function getFinSlice(period){
  // Keep FIN_HISTORY immutable but patch the most recent months with live occupancy
  // so Financial page always shows accurate current occupancy
  const liveOcc=getOccupancyStats();
  const livePct=liveOcc.pct;
  // Patch last 3 months (2026) with live pct
  FIN_HISTORY.filter(d=>d.year===2026).forEach(d=>{d.occ=livePct;});
  const all = FIN_HISTORY;
  const n = {lm:1,'6m':6,'12m':12,'2y':24,'3y':36,'5y':60}[period] || 12;
  const slice = all.slice(-n);
  // For >24 months group into annual totals for cleaner charts
  const useYearly = slice.length > 24;
  let points;
  if(useYearly){
    const map = {};
    slice.forEach(d=>{
      if(!map[d.year]) map[d.year]={year:d.year,label:String(d.year),rev:0,opex:0,noi:0,occ:[],svc:0,util:0,noipct:0};
      map[d.year].rev+=d.rev; map[d.year].opex+=d.opex;
      map[d.year].noi+=d.noi; map[d.year].occ.push(d.occ);
      map[d.year].svc+=(d.svc||0); map[d.year].util+=(d.util||0);
    });
    points = Object.values(map).map(y=>({
      ...y,
      occ:Math.round(y.occ.reduce((a,b)=>a+b,0)/y.occ.length),
      noipct:Math.round(y.noi/y.rev*100),
      svcEfficiency:y.util>0?Math.round(y.svc/y.util*100):0,
    }));
  } else {
    points = slice;
  }
  return {slice, points, useYearly};
}

function computeOverviewStats(){
  // Use canonical occupancy (BUILDING_CONFIG as NLA source of truth)
  const _occ=getOccupancyStats();
  const occupied=STATE.tenants.filter(t=>t.status!=='terminated'&&t.industry!=='Vacant');
  const active=occupied; // alias for rest of function
  const occupiedM2=_occ.occupied;
  const totalM2=occupiedM2;
  const NLA=_occ.nla;
  const vacantM2=_occ.vacant;
  const occupancyPct=_occ.pct;
  const totalRevMonth=occupied.reduce((s,t)=>s+t.m2*t.rent,0);
  const wAvgRent=occupiedM2>0?totalRevMonth/occupiedM2:0;

  // Expiring within 6 months (today = 2026-03-14, so ≤ 2026-09)
  const cutoff='2026-09';
  const expiring=active.filter(t=>t.expiry&&t.expiry<=cutoff&&t.status!=='terminated');
  const expiringM2=expiring.reduce((s,t)=>s+t.m2,0);

  // Dynamic alerts from STATE
  const alerts=[];
  // Terminations
  STATE.tenants.filter(t=>t.status==='terminated').forEach(t=>{
    alerts.push({level:'h',title:`${t.name} — contract terminated`,sub:`Floor ${t.floors} · ${t.m2.toLocaleString()} m² now vacant`});
  });
  // At-risk leases
  STATE.tenants.filter(t=>t.status==='atrisk').forEach(t=>{
    alerts.push({level:'h',title:`${t.name} — at risk`,sub:`Floor ${t.floors} · ${t.m2.toLocaleString()} m² · Renewal needed`});
  });
  // Expiring ≤3 months (2026-06)
  active.filter(t=>t.expiry&&t.expiry<='2026-06').forEach(t=>{
    alerts.push({level:'h',title:`${t.name} lease expiring ${t.expiry}`,sub:`Floor ${t.floors} · ${t.m2.toLocaleString()} m² · Action required`});
  });
  // Expiring 3–6 months
  active.filter(t=>t.expiry&&t.expiry>'2026-06'&&t.expiry<=cutoff).forEach(t=>{
    alerts.push({level:'m',title:`${t.name} expiring ${t.expiry}`,sub:`Floor ${t.floors} · ${t.m2.toLocaleString()} m²`});
  });
  // Static operational alerts
  alerts.push({level:'m',title:'Chiller Unit 2 PM overdue — 18 days',sub:'Facilities team · Scheduled Mar 22'});
  alerts.push({level:'l',title:'EDGE Cert renewal due Q3 2026',sub:'SGS Vietnam audit to schedule'});

  return {active,totalM2,occupiedM2,vacantM2,totalRevMonth,wAvgRent,occupancyPct,NLA,expiring,expiringM2,alerts};
}

function priorityBadge(p){
  const c={high:'var(--bad)',medium:'var(--warn)',low:'var(--ok)'}[p]||'var(--txt3)';
  const l={high:'🔴 High',medium:'🟡 Medium',low:'🟢 Low'}[p]||p||'—';
  return `<span style="font-size:10px;font-weight:600;color:${c};background:${c}18;padding:2px 8px;border-radius:4px;text-transform:capitalize">${l}</span>`;
}
function ticketStatusBadge(s){
  const c={open:'var(--bad)',in_progress:'var(--warn)',resolved:'var(--ok)'}[s]||'var(--txt3)';
  const l={open:'Open',in_progress:'In Progress',resolved:'Resolved'}[s]||s||'—';
  return `<span style="font-size:10px;color:${c};background:${c}15;padding:2px 8px;border-radius:4px">${l}</span>`;
}

function filterTickets(val){
  if(!CU) return;
  const list=document.getElementById('ticket-list'); if(!list)return;
  let filtered=STATE.tickets;
  if(val==='open') filtered=filtered.filter(t=>t.status==='open');
  else if(val==='inprogress') filtered=filtered.filter(t=>t.status==='inprogress');
  else if(val==='resolved') filtered=filtered.filter(t=>t.status==='resolved');
  else if(val==='high') filtered=filtered.filter(t=>t.priority==='high');
  // re-render with same card template
  const canEdit=canOpsWrite();
  list.innerHTML=filtered.map(t=>{
    const photoHtml=t.photos&&t.photos.length>0?`<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:8px">${t.photos.map(p=>`<img src="${p.data}" style="width:72px;height:54px;object-fit:cover;border-radius:5px;border:0.5px solid var(--b1);cursor:pointer" onclick="viewPhoto('${p.data}','${p.name}')">`).join('')}</div>`:'';
    const bc=t.priority==='high'?'rgba(226,75,74,.25)':t.priority==='medium'?'rgba(232,160,32,.2)':'rgba(59,114,200,.18)';
    const tc=t.priority==='high'?'var(--bad)':t.priority==='medium'?'var(--warn)':'var(--indigo)';
    return `<div style="background:var(--card2);border:0.5px solid ${bc};border-radius:8px;padding:13px 15px;margin-bottom:10px;border-top:2px solid ${tc}">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px">
        <div style="flex:1">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px"><span style="font-size:10px;font-weight:500;color:${tc};background:${tc}18;padding:2px 7px;border-radius:4px">${t.id}</span>${priorityBadge(t.priority)} ${ticketStatusBadge(t.status)}</div>
          <div style="font-size:13px;font-weight:500;color:var(--txt)">${t.title}</div>
          <div style="font-size:10px;color:var(--txt3);margin-top:4px">Reporter: ${t.reporter||t.assigned} · Started: ${t.startDate} ${t.startTime||''} ${t.status==='resolved'&&t.resolvedDate?'· Resolved: '+t.resolvedDate+' '+t.resolvedTime:''}</div>
        </div>
        ${canEdit?`<button class="fbtn fsec" style="font-size:10px;padding:4px 8px;flex-shrink:0" onclick="openTicketDetail('${t.id}')">View / Update</button>`:''}
      </div>
      ${photoHtml}
    </div>`;
  }).join('')||'<div style="padding:20px;text-align:center;color:var(--txt3);font-size:12px">No tickets match this filter.</div>';
}

function updateTicketStatus(id,status){
  const t=STATE.tickets.find(x=>x.id===id);if(!t)return;
  const old=t.status; t.status=status;
  if(status==='resolved'&&!t.resolvedDate){
    const now=new Date();
    t.resolvedDate=now.toISOString().slice(0,10);
    t.resolvedTime=now.toTimeString().slice(0,5);
    t.updates=t.updates||[];
    t.updates.push({ts:now.toISOString().slice(0,16).replace('T',' '),user:CU.name,note:'Ticket marked as resolved.'});
  }
  addAudit('Updated ticket status',`${id}: "${t.title}" — ${old} → ${status}`);
  goto('operations');
}

function attachPhoto(ticketId, input){
  const t=STATE.tickets.find(x=>x.id===ticketId);if(!t)return;
  t.photos=t.photos||[];
  const files=Array.from(input.files);
  let loaded=0;
  files.forEach(file=>{
    const reader=new FileReader();
    reader.onload=e=>{
      t.photos.push({name:file.name,data:e.target.result});
      loaded++;
      if(loaded===files.length){
        addAudit('Attached photo evidence',`${ticketId}: ${files.map(f=>f.name).join(', ')}`);
        openTicketDetail(ticketId);
      }
    };
    reader.readAsDataURL(file);
  });
}

function removePhoto(ticketId, idx){
  const t=STATE.tickets.find(x=>x.id===ticketId);if(!t)return;
  const name=t.photos[idx].name;
  t.photos.splice(idx,1);
  addAudit('Removed photo',`${ticketId}: removed ${name}`);
  openTicketDetail(ticketId);
}

function viewPhoto(dataUrl, name){
  const modal=document.getElementById('photo-modal');if(!modal)return;
  modal.innerHTML=`<div style="position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:200;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px" onclick="document.getElementById('photo-modal').innerHTML=''">
    <div style="font-size:12px;color:rgba(255,255,255,.6)">${name} &nbsp;·&nbsp; Click anywhere to close</div>
    <img src="${dataUrl}" style="max-width:90vw;max-height:80vh;border-radius:8px;border:1px solid rgba(255,255,255,.15)">
  </div>`;
}

function postTicketUpdate(id){
  const t=STATE.tickets.find(x=>x.id===id);if(!t)return;
  const note=document.getElementById('upd-note-'+id).value.trim();if(!note){alert('Please write an update note.');return;}
  const newStatus=document.getElementById('upd-status-'+id).value;
  const now=new Date();
  const ts=now.toISOString().slice(0,16).replace('T',' ');
  t.updates=t.updates||[];
  t.updates.push({ts,user:CU.name,note});
  const oldStatus=t.status;
  t.status=newStatus;
  if(newStatus==='resolved'&&!t.resolvedDate){
    t.resolvedDate=now.toISOString().slice(0,10);
    t.resolvedTime=now.toTimeString().slice(0,5);
  }
  addAudit('Posted ticket update',`${id}: "${note.slice(0,60)}" → status: ${newStatus}`);
  openTicketDetail(id);
  goto('operations');
}

function saveNewTicket(){
  const title=document.getElementById('nt-title').value.trim();if(!title)return;
  const ids=STATE.tickets.map(t=>parseInt((t.id.split('-')[1])||0));
  const newId='TK-0'+(Math.max(...ids)+1);
  const now=new Date();
  const newT={
    id:newId,title,
    priority:document.getElementById('nt-pri').value,
    status:'open',
    category:document.getElementById('nt-cat').value,
    floor:document.getElementById('nt-floor').value,
    assigned:document.getElementById('nt-assign').value,
    reporter:CU.name,
    startDate:now.toISOString().slice(0,10),
    startTime:document.getElementById('nt-time').value,
    resolvedDate:'',resolvedTime:'',
    description:document.getElementById('nt-desc').value,
    photos:[],
    updates:[{ts:now.toISOString().slice(0,16).replace('T',' '),user:CU.name,note:'Incident reported.'}],
  };
  // handle photo uploads
  const photoInput=document.getElementById('nt-photos');
  const files=Array.from(photoInput.files);
  STATE.tickets.unshift(newT);
  addAudit('Reported new incident '+newId,`${title} · ${newT.category} · ${newT.floor}`);
  if(files.length>0){
    let loaded=0;
    files.forEach(file=>{
      const reader=new FileReader();
      reader.onload=e=>{
        newT.photos.push({name:file.name,data:e.target.result});
        loaded++;
        if(loaded===files.length) goto('operations');
      };
      reader.readAsDataURL(file);
    });
  } else {
    goto('operations');
  }
}

function updateForecast(){
  const occEl=document.getElementById('occ-sl');if(!occEl)return;
  const occ=parseInt(occEl.value);
  const rent=parseInt(document.getElementById('rent-sl').value)/10;
  const esc=parseInt(document.getElementById('esc-sl').value)/100;
  const opxG=parseInt(document.getElementById('opx-sl').value)/100;
  document.getElementById('occ-out').textContent=occ;
  document.getElementById('rent-out').textContent=rent.toFixed(1);
  document.getElementById('esc-out').textContent=parseInt(document.getElementById('esc-sl').value);
  document.getElementById('opx-out').textContent=parseInt(document.getElementById('opx-sl').value);

  // Live NLA and base OpEx from STATE
  const net=STATE.tenants.reduce((s,t)=>s+t.m2,0)||20036;
  const liveOpxMonth=STATE.contracts.filter(c=>c.type!=='tenant').reduce((s,c)=>s+(c.monthlyValue||0),0)||128000;
  const baseOpx=liveOpxMonth*12/1e6;

  const baseRev=(occ/100)*net*rent*12/1e6;
  const revs=[1,2,3,4,5].map(y=>+(baseRev*Math.pow(1+esc,y-1)).toFixed(3));
  const opxs=[1,2,3,4,5].map(y=>+(baseOpx*Math.pow(1+opxG,y-1)).toFixed(3));
  const nois=revs.map((r,i)=>+(r-opxs[i]).toFixed(3));
  document.getElementById('fc-r1').textContent='$'+revs[0].toFixed(2)+'M';
  document.getElementById('fc-n1').textContent='$'+nois[0].toFixed(2)+'M';
  document.getElementById('fc-r3').textContent='$'+revs[2].toFixed(2)+'M';
  document.getElementById('fc-n3').textContent='$'+nois[2].toFixed(2)+'M';
  mkChart('c-forecast',{type:'bar',data:{labels:['2026','2027','2028','2029','2030'],datasets:[
    {label:'Revenue',data:revs,backgroundColor:'rgba(59,114,200,.5)',borderRadius:3,order:2},
    {label:'NOI',data:nois,backgroundColor:'rgba(46,204,154,.5)',borderRadius:3,order:2},
    {label:'OpEx',data:opxs,type:'line',fill:false,borderColor:'#E8A020',borderWidth:1.5,pointRadius:3,tension:.3,order:1}
  ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:GTICK,grid:{display:false}},y:{ticks:{...GTICK,callback:v=>'$'+v.toFixed(1)+'M'},grid:GGRID}}}});
}

function saveNewUser(){
  const u=document.getElementById('nu-u').value.trim();
  const name=document.getElementById('nu-name').value.trim();
  const p=document.getElementById('nu-p').value;
  if(!u||!name||!p){alert('All fields required');return;}
  if(ACCOUNTS.find(a=>a.u===u)){alert('Username already exists');return;}
  const role=document.getElementById('nu-role').value;
  const init=name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  ACCOUNTS.push({u,p,role,name,init});
  addAudit('Admin: created user account',`${name} (@${u}) as ${ROLES[role].label}`);
  document.getElementById('admin-form').innerHTML='';
  rAdmin(document.querySelector('.pg'));
}

function rPriceLog(el){
  if(!canViewPriceLog()){el.innerHTML=denied('Price History is accessible to Chairman, GD, Director, Head of Leasing, and Accounting only.');return;}

  // Flatten all price history entries across all tenants, sorted newest first
  const allEntries=[];
  STATE.tenants.forEach(t=>{
    (t.priceHistory||[]).forEach(h=>{
      allEntries.push({...h,tenantId:t.id,tenantName:t.name,floor:t.floors});
    });
  });
  allEntries.sort((a,b)=>b.date.localeCompare(a.date));

  const typeColor={escalation:'#2ECC9A',discount:'#E24B4A',correction:'#3B72C8',renewal:'#C8A84B',negotiated:'#E8A020',initial:'#7A9BB8',freeze:'#A78BFA'};
  const typeBg={escalation:'rgba(46,204,154,.12)',discount:'rgba(226,75,74,.12)',correction:'rgba(59,114,200,.12)',renewal:'rgba(200,168,75,.12)',negotiated:'rgba(232,160,32,.12)',initial:'rgba(120,160,190,.12)',freeze:'rgba(167,139,250,.12)'};

  // LTM monthly revenue series — collect all unique months from Jan 2025 to Mar 2026
  const ltmMonths=[];
  const d=new Date('2025-01-01');
  while(d<=new Date('2026-03-01')){ltmMonths.push(d.toISOString().slice(0,7));d.setMonth(d.getMonth()+1);}

  // For each month, compute total revenue using effective rates
  const ltmRevenue=ltmMonths.map(mon=>{
    let total=0;
    STATE.tenants.forEach(t=>{
      const hist=(t.priceHistory||[]).filter(h=>h.date<=mon).sort((a,b)=>b.date.localeCompare(a.date));
      const rate=hist.length>0?hist[0].rent:t.rent;
      const area=hist.length>0?hist[0].m2:t.m2;

    return Math.round(total/1000);

      <td style="font-size:12px;color:${e.pct!=null&&e.pct<0?'var(--bad)':e.pct>0?'var(--ok)':'var(--txt3)'};font-weight:500">${pctStr}</td>
      <td style="font-size:11px;color:var(--txt)">${e.m2.toLocaleString()} m²</td>
      <td style="font-size:12px;font-weight:500;color:var(--txt)">$${e.rent}/m²</td>
      <td style="font-size:11px;color:var(--txt2);max-width:220px;white-space:normal">${e.reason}</td>
      <td style="font-size:10px;color:var(--txt3)">${e.changedBy||'—'}</td>
    </tr>`;

  el.innerHTML=`

  <div class="psub">Last 12 months revenue trend · All rent/m² changes with reason, type, %, and editor · Visible to Chairman, GD, Director, Leasing & Accounting</div>

  <div class="krow k4">
    <div class="kpi k-jade"><div class="kl">Total Price Events</div><div class="kv">${totalChanges}</div><div class="kd fl">across all tenants</div></div>
    <div class="kpi k-blue"><div class="kl">Escalations</div><div class="kv">${escalations}</div><div class="kd up">Normal rate increases</div></div>
    <div class="kpi k-bad"><div class="kl">Discounts</div><div class="kv">${discounts}</div><div class="kd dn">Promotional / incentive</div></div>
    <div class="kpi k-warn"><div class="kl">Corrections</div><div class="kv">${corrections}</div><div class="kd fl">m² or rate adjustments</div></div>
  </div>

  <div class="card" style="margin-bottom:14px">
    <div class="ct">Monthly Revenue (LTM) — Jan 2025 to Mar 2026
      <span style="font-size:10px;color:var(--txt3)">Reflects actual rates effective each month</span>
    </div>
    <div style="display:flex;gap:14px;margin-bottom:10px;flex-wrap:wrap">
      <span style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--txt2)"><span style="width:10px;height:10px;border-radius:2px;background:#3B72C8"></span>Total monthly revenue ($K)</span>
      <span style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--txt2)"><span style="width:10px;height:3px;background:#C8A84B"></span>Trend line</span>

      <tbody id="pl-tbody">${logRows}</tbody>
    </table>
    ${allEntries.length>30?`<div style="font-size:11px;color:var(--txt3);padding:8px 0;text-align:center">${allEntries.length-30} earlier entries not shown — export CSV for full history</div>`:''}

function filterPriceLog(type){
  const tbody=document.getElementById('pl-tbody');if(!tbody)return;
  const typeColor={escalation:'#2ECC9A',discount:'#E24B4A',correction:'#3B72C8',renewal:'#C8A84B',negotiated:'#E8A020',initial:'#7A9BB8',freeze:'#A78BFA'};
  const typeBg={escalation:'rgba(46,204,154,.12)',discount:'rgba(226,75,74,.12)',correction:'rgba(59,114,200,.12)',renewal:'rgba(200,168,75,.12)',negotiated:'rgba(232,160,32,.12)',initial:'rgba(120,160,190,.12)',freeze:'rgba(167,139,250,.12)'};
  const all=[];
  STATE.tenants.forEach(t=>(t.priceHistory||[]).forEach(h=>all.push({...h,tenantName:t.name,floor:t.floors})));
  all.sort((a,b)=>b.date.localeCompare(a.date));
  const filtered=type==='all'?all:all.filter(e=>e.type===type);
  tbody.innerHTML=filtered.map(e=>{
    const tc=typeColor[e.type]||'#7A9BB8';const tbg=typeBg[e.type]||'rgba(120,160,190,.1)';
    const pctStr=e.pct!=null?`${e.pct>0?'+':''}${e.pct}%`:'—';
    return `<tr><td style="color:var(--txt3);font-size:11px">${e.date}</td><td class="tdm">${e.tenantName}</td><td style="font-size:11px;color:var(--txt2)">Fl ${e.floor}</td><td><span style="background:${tbg};color:${tc};font-size:10px;padding:2px 8px;border-radius:12px;font-weight:500">${e.type}</span></td><td style="font-size:12px;color:${e.pct!=null&&e.pct<0?'var(--bad)':e.pct>0?'var(--ok)':'var(--txt3)'};font-weight:500">${pctStr}</td><td style="font-size:11px;color:var(--txt)">${e.m2.toLocaleString()} m²</td><td style="font-size:12px;font-weight:500;color:var(--txt)">$${e.rent}/m²</td><td style="font-size:11px;color:var(--txt2);max-width:220px;white-space:normal">${e.reason}</td><td style="font-size:10px;color:var(--txt3)">${e.changedBy||'—'}</td></tr>`;
  }).join('')||'<tr><td colspan="9" style="text-align:center;color:var(--txt3);padding:16px">No entries for this filter.</td></tr>';
}

function exportPriceLog(){
  const all=[];
  STATE.tenants.forEach(t=>(t.priceHistory||[]).forEach(h=>all.push({...h,tenantName:t.name,floor:t.floors})));
  all.sort((a,b)=>b.date.localeCompare(a.date));
  const csv=[['Date','Tenant','Floor','Type','Change%','m2','Rate$/m2','Reason','UpdatedBy'],
    ...all.map(e=>[e.date,e.tenantName,e.floor,e.type,e.pct||'',e.m2,e.rent,`"${e.reason}"`,e.changedBy||''])
  ].map(r=>r.join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='LeadvisorsTower_PriceLog.csv';a.click();
  addAudit('Exported price history log','Full price change log downloaded as CSV');
}

function rBuildingConfig(el){
  const BC=BUILDING_CONFIG;
  const canEdit=canEditBuildingConfig();

  // ── Use canonical occupancy stats ────────────────────────────────
  const _stats=getOccupancyStats();
  const floorOcc=_stats.floorOcc;
  const totalNLA=_stats.nla;
  const totalOcc=_stats.occupied;
  const totalVac=_stats.vacant;
  const totalPct=_stats.pct;

  // ── Sort floors logically: L1 first, then numeric ─────────────────
  const allFloors=Object.entries(BC.floor_areas).sort((a,b)=>{
    const aNum=a[0]==='L1'?0:parseInt(a[0])||999;
    const bNum=b[0]==='L1'?0:parseInt(b[0])||999;
    return aNum-bNum;
  });

  // ── Build floor rows ───────────────────────────────────────────────
  const floorRows=allFloors.map(([fid,nla])=>{
    const occ=Math.min(nla, floorOcc[fid]||0);
    const vac=Math.max(0,nla-occ);
    const pct=nla>0?Math.round(occ/nla*100):0;

    // Tenant name(s) on this floor
    const fNum=fid.replace('F','');
    const fTenants=STATE.tenants.filter(t=>
      t.status!=='terminated'&&t.industry!=='Vacant'&&(
        t.floors===fNum || t.floors===fid ||
        (t.floors.includes('-')&&
         parseInt(t.floors.split('-')[0])<=parseInt(fNum)&&
         parseInt(fNum)<=parseInt(t.floors.split('-')[1]))
      ));
    const names=fTenants.map(t=>t.name.split(' ')[0]).join(', ')||'—';

    // Color: green=good/occupied, orange=partial, green(light)=vacant/available
    const pctColor=pct>=100?'var(--ok)':pct>=50?'var(--warn)':pct>0?'var(--bad)':'var(--txt3)';
    const vacColor=vac>0?'var(--jade2)':'var(--txt3)';
    const statusLabel=pct>=100?'Full':vac>0?vac+'m² avail':'—';

    const inputTd=canEdit
      ? '<td><input type="number" value="'+nla+'" id="nla-'+fid
        +'" class="finp" style="width:80px;font-size:11px;padding:4px 8px;text-align:right"'
        +' min="0" step="10" onchange="liveUpdateFloor(\''+fid+'\',this.value)"></td>'
      : '<td style="color:var(--txt3);font-size:11px">'+nla+'</td>';

    return '<tr id="flrow-'+fid+'">'
      +'<td style="font-weight:600;font-size:12px">'+fid+'</td>'
      +'<td style="text-align:right">'+nla.toLocaleString()+'</td>'
      +'<td style="text-align:right;color:var(--indigo);font-weight:500">'+occ.toLocaleString()+'</td>'
      +'<td style="text-align:right;color:'+vacColor+';font-weight:'+(vac>0?'500':'400')+'">'+vac.toLocaleString()+'</td>'
      +'<td style="text-align:center">'
        +'<div style="display:flex;align-items:center;gap:6px">'
          +'<div style="flex:1;height:6px;background:var(--lift);border-radius:3px;overflow:hidden">'
            +'<div style="height:100%;width:'+pct+'%;background:'+pctColor+';border-radius:3px;transition:width .3s"></div>'
          +'</div>'
          +'<span style="font-size:11px;font-weight:600;color:'+pctColor+';min-width:36px">'+pct+'%</span>'
        +'</div>'
      +'</td>'
      +'<td style="font-size:11px;color:var(--txt2)">'+names+'</td>'
      +(canEdit?inputTd:'')
      +'</tr>';
  }).join('');

  // ── Render ─────────────────────────────────────────────────────────
  el.innerHTML=`
  <div class="ptitle">Building Configuration</div>
  <div class="psub">${BC.name} · ${BC.address} · ${canEdit?'<span style="color:var(--jade2)">✎ Edit mode</span>':'Read-only view'}</div>

  <!-- Summary KPIs -->
  <div class="krow k4" style="margin-bottom:16px">
    <div class="kpi k-gold">
      <div class="kl">Total NLA</div>
      <div class="kv">${(totalNLA/1000).toFixed(2)}<em>K m²</em></div>
      <div class="kd fl">${allFloors.length} leasable floors</div>
    </div>
    <div class="kpi k-blue">
      <div class="kl">Occupied</div>
      <div class="kv">${(totalOcc/1000).toFixed(2)}<em>K m²</em></div>
      <div class="kd up">${totalPct}% occupancy rate</div>
    </div>
    <div class="kpi k-jade">
      <div class="kl">Vacant</div>
      <div class="kv">${totalVac.toLocaleString()}<em> m²</em></div>
      <div class="kd fl">${Math.round(totalVac/totalNLA*100)}% available</div>
    </div>
    <div class="kpi k-warn">
      <div class="kl">GFA / Efficiency</div>
      <div class="kv">${(BC.gfa/1000).toFixed(1)}<em>K m²</em></div>
      <div class="kd fl">${Math.round(totalNLA/BC.gfa*100)}% NLA/GFA ratio</div>
    </div>
  </div>

  <!-- Building info (compact, always visible) -->
  <div class="card" style="margin-bottom:14px">
    <div class="ct">Building Information ${canEdit?`<button class="fbtn fpri" style="font-size:10px;padding:3px 10px" onclick="saveBuildingInfo()">💾 Save Info</button>`:''}</div>

// ── Live preview: update row totals as user types ─────────────────────
function liveUpdateFloor(fid, val){
  const n=parseInt(val)||0;
  if(n<0) return;
  // Optimistically update BUILDING_CONFIG (not saved until saveAllFloorNLA)
  BUILDING_CONFIG.floor_areas[fid]=n;
}

// ── Save all floor NLA inputs at once ─────────────────────────────────
function saveAllFloorNLA(){
  let changed=0;
  Object.keys(BUILDING_CONFIG.floor_areas).forEach(fid=>{
    const input=document.getElementById('nla-'+fid);
    if(input){
      const n=parseInt(input.value)||0;
      if(n>=0&&n!==BUILDING_CONFIG.floor_areas[fid]){
        BUILDING_CONFIG.floor_areas[fid]=n;
        changed++;
      }
    }
  });
  BUILDING_CONFIG.nla=Object.values(BUILDING_CONFIG.floor_areas).reduce((s,v)=>s+v,0);
  addAudit('Floor NLA updated',changed+' floors updated. Total NLA: '+BUILDING_CONFIG.nla.toLocaleString()+'m²');
  showToast('✓ '+changed+' floor(s) updated — all calculations refreshed','ok');
  goto('building_config');
}

// ── Save building info fields ──────────────────────────────────────────
function saveBuildingInfo(){
  const g=id=>document.getElementById(id)?.value;
  if(g('bc-name'))   BUILDING_CONFIG.name=g('bc-name')||BUILDING_CONFIG.name;
  if(g('bc-gfa'))    BUILDING_CONFIG.gfa=parseInt(g('bc-gfa'))||BUILDING_CONFIG.gfa;
  if(g('bc-svc'))    BUILDING_CONFIG.std_svc_fee=parseFloat(g('bc-svc'))||BUILDING_CONFIG.std_svc_fee;
  addAudit('Building info updated','Name: '+BUILDING_CONFIG.name+' · GFA: '+BUILDING_CONFIG.gfa+'m² · Svc fee: $'+BUILDING_CONFIG.std_svc_fee+'/m²');
  saveData();
  showToast('✓ Building info saved','ok');
  goto('building_config');
}

// ── Add a new floor ────────────────────────────────────────────────────
function addFloorNLA(){
  let fid=(document.getElementById('bc-new-floor')?.value||'').trim().toUpperCase();
  const nla=parseInt(document.getElementById('bc-new-nla')?.value)||0;
  if(!fid){showToast('Enter a floor ID (e.g. 26F or L2)','bad');return;}
  if(nla<=0){showToast('Enter a valid NLA area in m²','bad');return;}
  // Auto-append F if it's a plain number
  if(/^\d+$/.test(fid)) fid=fid+'F';
  if(BUILDING_CONFIG.floor_areas[fid]){
    showToast('Floor '+fid+' already exists — edit the NLA value in the table','bad');return;
  }
  BUILDING_CONFIG.floor_areas[fid]=nla;
  BUILDING_CONFIG.nla=Object.values(BUILDING_CONFIG.floor_areas).reduce((s,v)=>s+v,0);
  if(!ALL_FLOOR_IDS.includes(fid)) ALL_FLOOR_IDS.push(fid);
  addAudit('New floor added',fid+': '+nla+'m²');
  saveData();
  showToast('✓ Floor '+fid+' added ('+nla.toLocaleString()+'m²) — re-renders everywhere','ok');
  goto('building_config');
}

// ── Delete a floor from config ─────────────────────────────────────────
function deleteFloor(fid){
  if(!confirm('Remove floor '+fid+' from building config? This does not remove tenant data.')) return;
  delete BUILDING_CONFIG.floor_areas[fid];
  BUILDING_CONFIG.nla=Object.values(BUILDING_CONFIG.floor_areas).reduce((s,v)=>s+v,0);
  addAudit('Floor removed from config',fid);
  showToast('Floor '+fid+' removed from config','ok');
  goto('building_config');
}

          <span style="font-size:18px;font-weight:400;color:var(--gold)">$${(totAll/1000).toFixed(1)}K</span>
        </div>`;
    }

    // NOI Waterfall (always current month)
    mkChart('c-noi-waterfall',{type:'bar',data:{
      labels:['Office Rent','Service Chg','Parking','F&B/Other','= Revenue','Mgmt Fee','Utilities','Cleaning','Security','Misc','= NOI'],
      datasets:[{
        data:[287,35,14,9,345,-42,-38,-18,-16,-14,217],
        backgroundColor:(ctx)=>{
          const v=ctx.raw;
          if(ctx.dataIndex===4) return 'rgba(200,168,75,.75)';
          if(ctx.dataIndex===10) return 'rgba(46,204,154,.75)';
          return v<0?'rgba(226,75,74,.55)':'rgba(59,114,200,.5)';
        },
        borderRadius:4,
      }]
    },options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>'$'+Math.abs(ctx.raw)+'K'+(ctx.raw<0?' (cost)':'')}}},
      scales:{x:{ticks:{...GTICK,maxRotation:38},grid:{display:false}},
              y:{ticks:{...GTICK,callback:v=>'$'+Math.abs(v)+'K'},grid:GGRID}}}});
  }
  if(tid==='accounting'){
    const paid=STATE.invoices.filter(i=>i.status==='paid').reduce((s,i)=>s+i.amount,0);
    const pend=STATE.invoices.filter(i=>i.status==='pending').reduce((s,i)=>s+i.amount,0);
    const over=STATE.invoices.filter(i=>i.status==='overdue').reduce((s,i)=>s+i.amount,0);
    mkChart('c-acc',{type:'doughnut',data:{labels:[`Collected $${Math.round(paid/1000)}K`,`Pending $${Math.round(pend/1000)}K`,`Overdue $${Math.round(over/1000)}K`],datasets:[{data:[paid,pend,over],backgroundColor:['#2ECC9A','#E8A020','#E24B4A'],borderWidth:0,hoverOffset:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{color:'#7A9BB8',font:{size:11},padding:12,boxWidth:12,boxHeight:12}}},cutout:'60%'}});
  }
  if(tid==='operations'){
    mkChart('c-energy',{type:'line',data:{labels:mo,datasets:[
      {label:'2026',data:[224,218,214,0,0,0,0,0,0,0,0,0],borderColor:'#3B72C8',borderWidth:2,fill:false,tension:.4,pointRadius:3},
      {label:'2025',data:[242,238,228,224,226,230,235,232,228,232,238,240],borderColor:'rgba(200,168,75,.45)',borderWidth:1.5,fill:false,tension:.4,pointRadius:0,borderDash:[4,3]}
    ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:GTICK,grid:{display:false}},y:{ticks:{...GTICK,callback:v=>v+'MWh'},grid:GGRID}}}});
  }
  if(tid==='forecast') updateForecast();
  if(tid==='pricelog'){
    // Build LTM revenue data
    const ltmMonths=[];
    const d=new Date('2025-01-01');
    while(d<=new Date('2026-03-01')){ltmMonths.push(d.toISOString().slice(0,7));d.setMonth(d.getMonth()+1);}
    const ltmRevenue=ltmMonths.map(mon=>{
      let total=0;
      STATE.tenants.forEach(t=>{
        const hist=(t.priceHistory||[]).filter(h=>h.date<=mon).sort((a,b)=>b.date.localeCompare(a.date));
        const rate=hist.length>0?hist[0].rent:t.rent;
        const area=hist.length>0?hist[0].m2:t.m2;
        total+=rate*area;
      });
      return Math.round(total/1000);
    });
    const ltmLabels=ltmMonths.map(m=>{const[y,mo]=m.split('-');return['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][parseInt(mo)-1]+(m.startsWith('2026')?'\'26':'\'25');});

    // Annotate months where price changes occurred
    const changeDates=new Set();
    STATE.tenants.forEach(t=>(t.priceHistory||[]).forEach(h=>{if(ltmMonths.includes(h.date))changeDates.add(h.date);}));
    const pointColors=ltmMonths.map(m=>changeDates.has(m)?'#E8A020':'#3B72C8');
    const pointSizes=ltmMonths.map(m=>changeDates.has(m)?7:3);

    mkChart('c-ltm-rev',{type:'bar',data:{labels:ltmLabels,datasets:[
      {label:'Revenue $K',data:ltmRevenue,backgroundColor:'rgba(59,114,200,.4)',borderRadius:3,order:2},
      {label:'Trend',data:ltmRevenue,type:'line',fill:false,borderColor:'#C8A84B',borderWidth:2,pointRadius:pointSizes,pointBackgroundColor:pointColors,tension:.35,order:1}
    ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{afterLabel:(ctx)=>{const mon=ltmMonths[ctx.dataIndex];const changes=[];STATE.tenants.forEach(t=>(t.priceHistory||[]).forEach(h=>{if(h.date===mon)changes.push(t.name+': '+h.reason.slice(0,40));} ));return changes.length?['','Changes this month:',...changes]:[];}}}},scales:{x:{ticks:{...GTICK,maxRotation:45},grid:{display:false}},y:{ticks:{...GTICK,callback:v=>'$'+v+'K'},grid:GGRID}}}});

    // Change type breakdown donut
    const allEntries=[];
    STATE.tenants.forEach(t=>(t.priceHistory||[]).forEach(h=>allEntries.push(h)));
    const typeCounts={escalation:0,discount:0,correction:0,renewal:0,negotiated:0,initial:0,freeze:0};
    allEntries.forEach(e=>{ if(typeCounts[e.type]!==undefined)typeCounts[e.type]++;});
    const typeKeys=Object.keys(typeCounts).filter(k=>typeCounts[k]>0);
    const typeColorsMap={escalation:'#2ECC9A',discount:'#E24B4A',correction:'#3B72C8',renewal:'#C8A84B',negotiated:'#E8A020',initial:'#7A9BB8',freeze:'#A78BFA'};
    mkChart('c-chtype',{type:'doughnut',data:{labels:typeKeys.map(k=>k+' ('+typeCounts[k]+')'),datasets:[{data:typeKeys.map(k=>typeCounts[k]),backgroundColor:typeKeys.map(k=>typeColorsMap[k]||'#7A9BB8'),borderWidth:0,hoverOffset:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{color:'#7A9BB8',font:{size:10},padding:8,boxWidth:10,boxHeight:10}}},cutout:'55%'}});

    // Average rent/m² per month LTM
    const avgRentByMonth=ltmMonths.map(mon=>{
      let totalRent=0,count=0;
      STATE.tenants.forEach(t=>{
        const hist=(t.priceHistory||[]).filter(h=>h.date<=mon).sort((a,b)=>b.date.localeCompare(a.date));
        const rate=hist.length>0?hist[0].rent:t.rent;
        totalRent+=rate; count++;
      });
      return count>0?parseFloat((totalRent/count).toFixed(2)):0;
    });
    mkChart('c-avgrent',{type:'line',data:{labels:ltmLabels,datasets:[{label:'Avg $/m²',data:avgRentByMonth,borderColor:'#C45A7A',borderWidth:2,fill:true,backgroundColor:'rgba(196,90,122,.1)',tension:.4,pointRadius:3,pointBackgroundColor:ltmMonths.map(m=>changeDates.has(m)?'#E8A020':'#C45A7A'),pointRadius:ltmMonths.map(m=>changeDates.has(m)?6:3)}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{...GTICK,maxRotation:45},grid:{display:false}},y:{ticks:{...GTICK,callback:v=>'$'+v},grid:GGRID,min:13,max:20}}}});
  }
  if(tid==='utilities'){
    const topFloors=STATE.utilities.slice().sort((a,b)=>b.kwh-a.kwh).slice(0,8);
    if(document.getElementById('c-util-elec')){
      mkChart('c-util-elec',{type:'bar',data:{
        labels:topFloors.map(u=>u.floor),
        datasets:[{label:'kWh',data:topFloors.map(u=>u.kwh),backgroundColor:'rgba(232,160,32,.6)',borderRadius:4}]
      },options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',
        plugins:{legend:{display:false}},
        scales:{x:{ticks:{...GTICK,callback:v=>v.toLocaleString()+'kWh'},grid:GGRID},
                y:{ticks:GTICK,grid:{display:false}}}}});
    }
  }
}
